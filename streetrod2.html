// ============================================================
// AUDIO MANAGER - Web Audio API retro sounds
// ============================================================
class AudioManager {
  constructor() {
    this.ctx = null;
    this.muted = false;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }

  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }

  play(type) {
    if (this.muted || !this.ctx) return;
    this.resume();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);

    switch(type) {
      case 'blip':
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, now);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now); osc.stop(now + 0.08);
        break;
      case 'select':
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.setValueAtTime(900, now + 0.05);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
        break;
      case 'cash':
        osc.type = 'square';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.setValueAtTime(1600, now + 0.06);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'wrench':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'countdown':
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, now);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'go':
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'win':
        osc.type = 'square';
        [523,659,784,1047].forEach((f,i) => {
          osc.frequency.setValueAtTime(f, now + i*0.12);
        });
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
      case 'lose':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.4);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'engine':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(60, now);
        gain.gain.setValueAtTime(0.04, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
        break;
      case 'error':
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
    }
  }

  toggleMute() { this.muted = !this.muted; return this.muted; }
}

// ============================================================
// INPUT MANAGER
// ============================================================
class InputManager {
  constructor(canvas) {
    this.canvas = canvas;
    this.mouseX = 0;
    this.mouseY = 0;
    this.clicked = false;
    this.keys = {};

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      this.mouseX = Math.floor((e.clientX - rect.left) / SCALE);
      this.mouseY = Math.floor((e.clientY - rect.top) / SCALE);
    });

    canvas.addEventListener('mousedown', (e) => {
      e.preventDefault();
      this.clicked = true;
    });

    canvas.addEventListener('mouseup', () => { this.clicked = false; });

    window.addEventListener('keydown', (e) => {
      this.keys[e.key.toLowerCase()] = true;
    });

    window.addEventListener('keyup', (e) => {
      this.keys[e.key.toLowerCase()] = false;
    });

    // Prevent context menu on right click
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  }

  consumeClick() {
    if (this.clicked) { this.clicked = false; return true; }
    return false;
  }

  isKeyDown(key) { return !!this.keys[key.toLowerCase()]; }
}

// ============================================================
// RENDERER - Canvas drawing primitives
// ============================================================
class Renderer {
  constructor(ctx) {
    this.ctx = ctx;
  }

  clear(color) {
    this.ctx.fillStyle = color || C.bg;
    this.ctx.fillRect(0, 0, W, H);
  }

  rect(x, y, w, h, color) {
    this.ctx.fillStyle = color;
    this.ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
  }

  text(str, x, y, color, size) {
    this.ctx.fillStyle = color || C.text;
    const s = size || 8;
    this.ctx.font = `${s}px monospace`;
    this.ctx.fillText(str, Math.floor(x), Math.floor(y));
  }

  textCentered(str, x, y, color, size) {
    const s = size || 8;
    this.ctx.font = `${s}px monospace`;
    const tw = this.ctx.measureText(str).width;
    this.text(str, x - tw / 2, y, color, size);
  }

  panel(x, y, w, h, bgColor, borderColor) {
    this.rect(x - 1, y - 1, w + 2, h + 2, borderColor || C.panelBorder);
    this.rect(x, y, w, h, bgColor || C.panelBg);
  }

  button(x, y, w, h, label, hover) {
    this.rect(x - 1, y - 1, w + 2, h + 2, hover ? C.yellow : C.panelBorder);
    this.rect(x, y, w, h, hover ? '#2a2a3e' : C.panelBg);
    this.textCentered(label, x + w / 2, y + h - 3, hover ? C.yellow : C.text);
    return hover;
  }

  progressBar(x, y, w, h, value, max, color) {
    this.rect(x - 1, y - 1, w + 2, h + 2, C.panelBorder);
    this.rect(x, y, w, h, '#0a0a12');
    const fill = Math.floor((value / max) * w);
    this.rect(x, y, fill, h, color || C.green);
  }

  drawStars(x, y, count, max) {
    for (let i = 0; i < max; i++) {
      this.text(i < count ? '★' : '☆', x + i * 10, y, i < count ? C.yellow : C.darkGray);
    }
  }

  drawTooltip(mx, my, text) {
    const tw = this.ctx.measureText(text).width + 8;
    let tx = mx - tw / 2;
    if (tx < 0) tx = 2;
    if (tx + tw > W) tx = W - tw - 2;
    this.panel(tx, my, tw, 14, '#0a0a12', C.yellow);
    this.textCentered(text, tx + tw / 2, my + 10, C.yellow);
  }

// ============================================================
// CAR CLASS
// ============================================================
class Car {
  constructor(template, condition) {
    this.name = template.name;
    this.year = template.year;
    this.horsepower = template.horsepower;
    this.weight = template.weight;
    this.grip = template.grip;
    this.reliability = template.reliability;
    this.baseValue = template.value;
    this.colorIdx = template.colorIdx;
    this.bodyStyle = template.bodyStyle || 'coupe';

    // Condition affects stats
    const condFactor = (condition || 70) / 100;
    this.condition = condition || 70;
    this.horsepower = Math.round(this.horsepower * condFactor);
    this.reliability = Math.round(this.reliability * condFactor);

    // Parts installed
    this.parts = {};
    this.hiddenIssues = [];
  }

  getPerformanceRating() {
    return Math.round((this.horsepower / this.weight * 100 + this.grip) * (this.reliability / 100));
  }

  getValue() {
    let val = this.baseValue * (this.condition / 100);
    // Add value for installed parts
    for (const key in this.parts) {
      val += this.parts[key].baseCost * 0.6;
    }
    return Math.round(val);
  }

  getSellPrice() {
    return Math.round(this.getValue() * rand(70, 90) / 100);
  }

  getRepairCost() {
    const needed = 100 - this.condition;
    return Math.round(needed * 25);
  }

  addPart(part) {
    this.parts[part.id] = part;
    if (part.hpBonus) this.horsepower += part.hpBonus;
    if (part.gripBonus) this.grip = Math.min(100, this.grip + part.gripBonus);
    if (part.relBonus) this.reliability = Math.min(100, this.reliability + part.relBonus);
    if (part.relPenalty) this.reliability = Math.max(5, this.reliability + part.relPenalty);
    if (part.weightBonus) this.weight += part.weightBonus;
  }

  clone() {
    const c = new Car({ name: this.name, year: this.year, horsepower: this.horsepower, weight: this.weight, grip: this.grip, reliability: this.reliability, value: this.baseValue, colorIdx: this.colorIdx, bodyStyle: this.bodyStyle }, this.condition);
    c.parts = JSON.parse(JSON.stringify(this.parts));
    c.hiddenIssues = [...this.hiddenIssues];
    return c;
  }
}

// ============================================================
// MAIN GAME CLASS
// ============================================================
class Game {
  constructor() {
    this.input = new InputManager(canvas);
    this.renderer = new Renderer(ctx);
    this.audio = new AudioManager();

    // Game state
    this.screen = 'title'; // title, garage, classifieds, inspect, partsShop, install, tune, sellCar, raceSelect, racing, results
    this.cash = 3500;
    this.reputation = 0;
    this.carsOwned = 1;
    this.racesWon = 0;
    this.day = 1;

    // Current car (start with a basic one)
    const starterTemplate = CAR_TEMPLATES[3]; // Sparrow Coupe - affordable
    this.currentCar = new Car(starterTemplate, 65);

    // Classified ads
    this.classifiedAds = [];
    this.selectedAd = -1;

    // Parts shop
    this.availableParts = [];
    this.selectedPartIdx = -1;

    // Race state
    this.selectedRace = 0;
    this.racePhase = 'countdown'; // countdown, racing, finished
    this.raceTimer = 180; // 3 seconds countdown at 60fps
    this.playerProgress = 0;
    this.opponentProgress = 0;
    this.raceResult = ''; // win, lose, breakdown

    // UI state
    this.message = '';
    this.messageTimer = 0;
    this.frameCount = 0;

    // Generate initial classifieds
    this.generateClassifieds();
    this.generateAvailableParts();

    // Bind click handler
    canvas.addEventListener('click', () => { this.audio.resume(); });
  }

  // ---- CLASSIFIEDS GENERATION ----
  generateClassifieds() {
    this.classifiedAds = [];
    for (let i = 0; i < rand(6, 10); i++) {
      const template = CAR_TEMPLATES[rand(0, CAR_TEMPLATES.length - 1)];
      const condition = rand(25, 90);
      const mileage = rand(10000, 200000);

      // Calculate asking price - ensure it's always a valid number
      const baseValue = template.value || 3000;
      const condFactor = condition / 100;
      const priceVariance = rand(-500, 500);
      let askingPrice = Math.round(baseValue * condFactor + priceVariance);
      askingPrice = Math.max(300, askingPrice); // Minimum price

      // Hidden issues
      const hiddenIssues = [];
      if (Math.random() < 0.3) hiddenIssues.push('bad transmission');
      if (Math.random() < 0.25) hiddenIssues.push('rust spots');
      if (Math.random() < 0.2) hiddenIssues.push('leaking oil');
      if (Math.random() < 0.15) hiddenIssues.push('worn brakes');

      const ad = {
        template: template,
        condition: condition,
        mileage: mileage,
        askingPrice: askingPrice,
        hiddenIssues: hiddenIssues,
        sellerName: SELLER_NAMES[rand(0, SELLER_NAMES.length - 1)],
        sellerFirmness: rand(30, 90), // How hard they are to negotiate with
        inspected: false,
      };

      this.classifiedAds.push(ad);
    }
  }

  // ---- PARTS GENERATION ----
  generateAvailableParts() {
    this.availableParts = [];
    for (let i = 0; i < PARTS_DATA.length; i++) {
      const p = PARTS_DATA[i];
      // Randomize price slightly
      const costVariance = rand(-50, 100);
      this.availableParts.push({
        ...p,
        cost: Math.max(100, p.baseCost + costVariance),
      });
    }
  }

  // ---- SET MESSAGE ----
  showMessage(msg, duration) {
    this.message = msg;
    this.messageTimer = duration || 120; // frames
  }

  // ---- BUY CAR ----
  buyCar(ad, price) {
    if (this.cash < price) {
      this.audio.play('error');
      this.showMessage('Not enough cash!', 90);
      return false;
    }

    this.cash -= price;
    const car = new Car(ad.template, ad.condition);

    // Apply hidden issues as condition penalties
    if (ad.hiddenIssues.length > 0) {
      car.condition = Math.max(10, car.condition - ad.hiddenIssues.length * 8);
      car.reliability = Math.max(5, car.reliability - ad.hiddenIssues.length * 10);
    }

    this.currentCar = car;
    this.carsOwned++;
    this.day += rand(1, 3);

    // Remove bought ad and regenerate classifieds
    this.classifiedAds = this.classifiedAds.filter(a => a !== ad);
    if (this.classifiedAds.length < 4) {
      this.generateClassifieds();
    }

    this.audio.play('cash');
    this.showMessage(`Bought ${car.year} ${car.name} for $${price}!`, 120);
    this.screen = 'garage';
    return true;
  }

  // ---- NEGOTIATE ----
  negotiate(ad, offer) {
    if (offer > this.cash) {
      this.audio.play('error');
      this.showMessage("You don't have that much cash!", 90);
      return false;
    }

    if (offer <= 0) {
      this.audio.play('error');
      this.showMessage("That's not a real offer!", 90);
      return false;
    }

    const ratio = offer / ad.askingPrice;
    let acceptChance = 0;

    if (ratio >= 1.0) {
      // At or above asking - always accepted
      acceptChance = 1.0;
    } else if (ratio >= 0.9) {
      // 90-100% of asking - likely accepted unless seller is very firm
      acceptChance = 0.7 + (1 - ad.sellerFirmness / 100) * 0.3;
    } else if (ratio >= 0.75) {
      // 75-90% - moderate chance, depends on firmness
      acceptChance = (1 - ad.sellerFirmness / 100) * 0.6;
    } else if (ratio >= 0.5) {
      // 50-75% - low chance, only if seller is easygoing
      acceptChance = (1 - ad.sellerFirmness / 100) * 0.25;
    } else {
      // Below 50% - insult offer, very unlikely
      acceptChance = (1 - ad.sellerFirmness / 100) * 0.05;
    }

    if (Math.random() < acceptChance) {
      this.audio.play('cash');
      this.showMessage(`${ad.sellerName} accepts $${offer}!`, 120);
      return this.buyCar(ad, offer);
    } else {
      // Seller counters or rejects
      if (ratio >= 0.7) {
        const counter = Math.round(ad.askingPrice * (0.85 + ad.sellerFirmness / 200));
        this.audio.play('blip');
        this.showMessage(`${ad.sellerName} says: "How about $${counter}?"`, 120);
        // Store counter offer for display
        ad.counterOffer = counter;
      } else {
        this.audio.play('error');
        this.showMessage(`${ad.sellerName} says: "That's an insult! Walk away."`, 120);
      }
      return false;
    }
  }

  // ---- INSTALL PART ----
  installPart(partIdx) {
    if (partIdx < 0 || partIdx >= this.availableParts.length) return;
    const part = this.availableParts[partIdx];

    if (!this.currentCar) {
      this.showMessage('You need a car first!', 90);
      return;
    }

    if (this.currentCar.parts[part.id]) {
      this.showMessage('Already installed!', 90);
      return;
    }

    if (this.cash < part.cost) {
      this.audio.play('error');
      this.showMessage("Can't afford that part!", 90);
      return;
    }

    this.cash -= part.cost;
    this.currentCar.addPart(part);
    this.day += rand(1, 2);

    // Remove from available parts (or regenerate)
    this.availableParts.splice(partIdx, 1);
    if (this.availableParts.length < 3) {
      this.generateAvailableParts();
    }

    this.audio.play('wrench');
    this.showMessage(`Installed ${part.name}!`, 120);
  }

  // ---- TUNE CAR ----
  tuneCar() {
    if (!this.currentCar) return;

    const cost = rand(50, 150);
    if (this.cash < cost) {
      this.audio.play('error');
      this.showMessage(`Need $${cost} to tune!`, 90);
      return;
    }

    this.cash -= cost;
    const hpGain = rand(2, 8);
    this.currentCar.horsepower += hpGain;
    this.day++;

    this.audio.play('wrench');
    this.showMessage(`Tuned! +${hpGain} HP`, 120);
  }

  // ---- REPAIR CAR ----
  repairCar() {
    if (!this.currentCar) return;

    const cost = this.currentCar.getRepairCost();
    if (this.cash < cost) {
      this.audio.play('error');
      this.showMessage(`Need $${cost} to repair!`, 90);
      return;
    }

    this.cash -= cost;
    const oldCond = this.currentCar.condition;
    this.currentCar.condition = Math.min(100, this.currentCar.condition + rand(20, 40));
    this.currentCar.reliability = Math.min(100, this.currentCar.reliability + rand(5, 15));
    this.day += rand(1, 3);

    this.audio.play('wrench');
    this.showMessage(`Repaired! Condition: ${oldCond}% -> ${this.currentCar.condition}%`, 120);
  }

  // ---- SELL CAR ----
  sellCar() {
    if (!this.currentCar) return;

    const price = this.currentCar.getSellPrice();
    this.cash += price;
    this.day++;

    this.audio.play('cash');
    this.showMessage(`Sold for $${price}!`, 120);

    // Reset to a basic starter car
    const starterTemplate = CAR_TEMPLATES[3];
    this.currentCar = new Car(starterTemplate, 50);
  }

  // ---- START RACE ----
  startRace(raceIdx) {
    if (!this.currentCar) {
      this.showMessage('You need a car to race!', 90);
      return;
    }

    this.selectedRace = raceIdx;
    this.racePhase = 'countdown';
    this.raceTimer = 180; // 3 seconds
    this.playerProgress = 0;
    this.opponentProgress = 0;
    this.raceResult = '';
    this.screen = 'racing';

    this.audio.play('countdown');
  }

  // ---- UPDATE RACE ----
  updateRace() {
    if (this.racePhase === 'countdown') {
      this.raceTimer--;

      // Play countdown beeps
      if (this.raceTimer === 120) this.audio.play('countdown');
      if (this.raceTimer === 60) this.audio.play('countdown');
      if (this.raceTimer === 1) {
        this.audio.play('go');
      }

      if (this.raceTimer <= 0) {
        this.racePhase = 'racing';
      }
    } else if (this.racePhase === 'racing') {
      const race = RACES[this.selectedRace];

      // Calculate player speed based on car performance
      const perf = this.currentCar.getPerformanceRating();
      const baseSpeed = 0.001 + (perf / 500) * 0.003;
      const playerSpeed = baseSpeed + (Math.random() - 0.5) * 0.001;

      // Opponent speed based on race difficulty
      const oppBaseSpeed = 0.001 + (race.difficulty / 6) * 0.003;
      const oppSpeed = oppBaseSpeed + (Math.random() - 0.5) * 0.001;

      this.playerProgress = Math.min(1, this.playerProgress + playerSpeed);
      this.opponentProgress = Math.min(1, this.opponentProgress + oppSpeed);

      // Check for breakdown
      if (Math.random() < (1 - this.currentCar.reliability / 100) * 0.002) {
        this.racePhase = 'finished';
        this.raceResult = 'breakdown';
        this.reputation = Math.max(0, this.reputation - 2);
        this.day += rand(3, 7);
        this.audio.play('lose');
        return;
      }

      // Check finish
      if (this.playerProgress >= 1 || this.opponentProgress >= 1) {
        this.racePhase = 'finished';

        if (this.playerProgress >= 1 && this.playerProgress > this.opponentProgress) {
          this.raceResult = 'win';
          const prize = Math.round(race.purse * (0.8 + Math.random() * 0.4));
          this.cash += prize;
          this.reputation += race.difficulty * 2;
          this.racesWon++;
          this.day += rand(1, 3);
          this.audio.play('win');
        } else {
          this.raceResult = 'lose';
          const consolation = Math.round(race.purse * 0.1);
          this.cash += consolation;
          this.day++;
          this.audio.play('lose');
        }
      }

      // Engine sound during race
      if (this.frameCount % 15 === 0) {
        this.audio.play('engine');
      }
    } else if (this.racePhase === 'finished') {
      // Wait for click to continue
    }
  }

  // ---- SAVE / LOAD ----
  saveGame() {
    const data = {
      cash: this.cash,
      reputation: this.reputation,
      carsOwned: this.carsOwned,
      racesWon: this.racesWon,
      day: this.day,
      currentCar: this.currentCar ? {
        name: this.currentCar.name,
        year: this.currentCar.year,
        horsepower: this.currentCar.horsepower,
        weight: this.currentCar.weight,
        grip: this.currentCar.grip,
        reliability: this.currentCar.reliability,
        baseValue: this.currentCar.baseValue,
        colorIdx: this.currentCar.colorIdx,
        bodyStyle: this.currentCar.bodyStyle,
        condition: this.currentCar.condition,
        parts: this.currentCar.parts,
      } : null,
    };

    localStorage.setItem('streetGarage89', JSON.stringify(data));
    this.audio.play('cash');
    this.showMessage('Game saved!', 90);
  }

  loadGame() {
    const raw = localStorage.getItem('streetGarage89');
    if (!raw) {
      this.audio.play('error');
      this.showMessage('No save found!', 90);
      return;
    }

    try {
      const data = JSON.parse(raw);
      this.cash = data.cash || 3500;
      this.reputation = data.reputation || 0;
      this.carsOwned = data.carsOwned || 1;
      this.racesWon = data.racesWon || 0;
      this.day = data.day || 1;

      if (data.currentCar) {
        const cd = data.currentCar;
        this.currentCar = new Car(CAR_TEMPLATES[0], cd.condition);
        Object.assign(this.currentCar, cd);
      }

      this.audio.play('cash');
      this.showMessage('Game loaded!', 90);
      this.screen = 'garage';
    } catch(e) {
      this.audio.play('error');
      this.showMessage('Failed to load save!', 90);
    }
  }

  // ---- KEYBOARD HANDLING ----
  handleKeyboard() {
    if (this.input.isKeyDown('c') && this.screen !== 'classifieds' && this.screen !== 'inspect') {
      this.audio.play('select');
      this.screen = 'classifieds';
    }
    if (this.input.isKeyDown('g') && this.screen !== 'garage') {
      this.audio.play('select');
      this.screen = 'garage';
    }
    if (this.input.isKeyDown('p') && this.screen !== 'partsShop' && this.screen !== 'install') {
      this.audio.play('select');
      this.screen = 'partsShop';
    }
    if (this.input.isKeyDown('r') && this.screen !== 'raceSelect' && this.screen !== 'racing' && this.screen !== 'results') {
      this.audio.play('select');
      this.screen = 'raceSelect';
    }
    if (this.input.isKeyDown('s')) {
      this.audio.play('select');
      this.screen = 'saveScreen';
    }
    if (this.input.isKeyDown('l')) {
      this.audio.play('select');
      this.screen = 'loadScreen';
    }
    if (this.input.isKeyDown('m')) {
      const muted = this.audio.toggleMute();
      this.showMessage(muted ? 'Audio Muted' : 'Audio On', 60);
    }
    if (this.input.isKeyDown('escape')) {
      this.audio.play('blip');
      if (this.screen === 'inspect') this.screen = 'classifieds';
      else if (this.screen === 'install') this.screen = 'partsShop';
      else if (this.screen === 'tune' || this.screen === 'sellCar') this.screen = 'garage';
      else if (this.screen === 'saveScreen' || this.screen === 'loadScreen') this.screen = 'garage';
      else if (this.screen !== 'title' && this.screen !== 'racing') this.screen = 'garage';
    }

    // Consume keys to prevent repeat
    if (this.input.isKeyDown('c')) this.input.keys['c'] = false;
    if (this.input.isKeyDown('g')) this.input.keys['g'] = false;
    if (this.input.isKeyDown('p')) this.input.keys['p'] = false;
    if (this.input.isKeyDown('r')) this.input.keys['r'] = false;
    if (this.input.isKeyDown('s')) this.input.keys['s'] = false;
    if (this.input.isKeyDown('l')) this.input.keys['l'] = false;
    if (this.input.isKeyDown('m')) this.input.keys['m'] = false;
  }

  // ---- CLICK HANDLING ----
  handleClick() {
    const mx = this.input.mouseX;
    const my = this.input.mouseY;

    switch (this.screen) {
      case 'title':
        this.audio.play('select');
        this.screen = 'garage';
        break;

      case 'saveScreen':
        if (mx >= 100 && mx <= 220 && my >= 115 && my <= 135) {
          this.saveGame();
          this.screen = 'garage';
        }
        break;

      case 'loadScreen':
        if (mx >= 100 && mx <= 220 && my >= 115 && my <= 135) {
          this.loadGame();
        }
        break;

      case 'garage':
        // Classifieds button
        if (mx >= 5 && mx <= 70 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'classifieds';
        }
        // Parts button
        if (mx >= 75 && mx <= 140 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'partsShop';
        }
        // Race button
        if (mx >= 145 && mx <= 200 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'raceSelect';
        }
        // Tune button
        if (mx >= 205 && mx <= 260 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'tune';
        }
        // Sell button
        if (mx >= 265 && mx <= 315 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'sellCar';
        }
        break;

      case 'classifieds':
        // Check ad clicks
        for (let i = 0; i < this.classifiedAds.length; i++) {
          const ly = 25 + i * 18;
          if (mx >= 5 && mx <= W - 10 && my >= ly && my <= ly + 16) {
            this.audio.play('select');
            this.selectedAd = i;
            this.screen = 'inspect';
            return;
          }
        }
        // Back button
        if (mx >= 5 && mx <= 40 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'garage';
        }
        break;

      case 'inspect': {
        const ad = this.classifiedAds[this.selectedAd];
        if (!ad) { this.screen = 'classifieds'; return; }

        // Inspect button
        if (mx >= 5 && mx <= 60 && my >= 182 && my <= 196) {
          this.audio.play('blip');
          ad.inspected = true;
        }

        // Offer button - opens offer input mode
        if (mx >= 70 && mx <= 130 && my >= 182 && my <= 196) {
          this.audio.play('select');
          // Auto-offer at 80% of asking price
          const offer = Math.round(ad.askingPrice * 0.8);
          this.negotiate(ad, offer);
        }

        // Buy at asking price button
        if (mx >= 140 && mx <= 210 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.buyCar(ad, ad.askingPrice);
        }

        // Walk away button
        if (mx >= 220 && mx <= 315 && my >= 182 && my <= 196) {
          this.audio.play('blip');
          this.screen = 'classifieds';
        }

        // Custom offer buttons (if counter offer exists)
        if (ad.counterOffer) {
          // Accept counter
          if (mx >= 5 && mx <= 80 && my >= 168 && my <= 180) {
            this.audio.play('select');
            this.negotiate(ad, ad.counterOffer);
          }
          // Counter back (85% of counter)
          if (mx >= 90 && mx <= 170 && my >= 168 && my <= 180) {
            this.audio.play('select');
            const counterBack = Math.round(ad.counterOffer * 0.85);
            this.negotiate(ad, counterBack);
          }
        }
        break;
      }

      case 'partsShop':
        // Check part clicks
        for (let i = 0; i < this.availableParts.length; i++) {
          const ly = 25 + i * 16;
          if (mx >= 5 && mx <= W - 10 && my >= ly && my <= ly + 14) {
            this.audio.play('select');
            this.selectedPartIdx = i;
            this.screen = 'install';
            return;
          }
        }
        // Back button
        if (mx >= 5 && mx <= 40 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'garage';
        }
        break;

      case 'install': {
        const part = this.availableParts[this.selectedPartIdx];
        if (!part) { this.screen = 'partsShop'; return; }

        // Install button
        if (mx >= 5 && mx <= 70 && my >= 182 && my <= 196) {
          this.installPart(this.selectedPartIdx);
        }
        // Cancel button
        if (mx >= 80 && mx <= 150 && my >= 182 && my <= 196) {
          this.audio.play('blip');
          this.screen = 'partsShop';
        }
        break;
      }

      case 'tune':
        // Tune button
        if (mx >= 5 && mx <= 70 && my >= 182 && my <= 196) {
          this.tuneCar();
        }
        // Repair button
        if (mx >= 80 && mx <= 150 && my >= 182 && my <= 196) {
          this.repairCar();
        }
        // Back button
        if (mx >= 160 && mx <= 220 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'garage';
        }
        break;

      case 'sellCar':
        // Confirm sell
        if (mx >= 5 && mx <= 80 && my >= 182 && my <= 196) {
          this.sellCar();
        }
        // Cancel
        if (mx >= 90 && mx <= 160 && my >= 182 && my <= 196) {
          this.audio.play('blip');
          this.screen = 'garage';
        }
        break;

      case 'raceSelect':
        // Check race clicks
        for (let i = 0; i < RACES.length; i++) {
          const race = RACES[i];
          const ly = 50 + i * 20;
          if (mx >= 5 && mx <= W - 10 && my >= ly && my <= ly + 18) {
            if (this.reputation >= race.minRep) {
              this.audio.play('select');
              this.startRace(i);
            } else {
              this.audio.play('error');
              this.showMessage(`Need ${race.minRep} reputation!`, 90);
            }
          }
        }
        // Back button
        if (mx >= 5 && mx <= 40 && my >= 182 && my <= 196) {
          this.audio.play('select');
          this.screen = 'garage';
        }
        break;

      case 'racing':
        if (this.racePhase === 'finished') {
          this.screen = 'results';
        }
        break;

      case 'results':
        this.screen = 'garage';
        break;
    }
  }

  // ---- UPDATE ----
  update() {
    this.frameCount++;

    // Handle keyboard
    this.handleKeyboard();

    // Handle clicks
    if (this.input.consumeClick()) {
      this.handleClick();
    }

    // Update message timer
    if (this.messageTimer > 0) {
      this.messageTimer--;
      if (this.messageTimer <= 0) {
        this.message = '';
      }
    }

    // Update race if in racing screen
    if (this.screen === 'racing') {
      this.updateRace();
    }

    // Regenerate classifieds periodically
    if (this.screen === 'classifieds' && this.frameCount % 600 === 0) {
      if (this.classifiedAds.length < 4) {
        this.generateClassifieds();
      }
    }
  }

  // ---- RENDER ----
  render() {
    switch (this.screen) {
      case 'title': this.renderTitle(); break;
      case 'garage': this.renderGarage(); break;
      case 'classifieds': this.renderClassifieds(); break;
      case 'inspect': this.renderInspect(); break;
      case 'partsShop': this.renderPartsShop(); break;
      case 'install': this.renderInstall(); break;
      case 'tune': this.renderTune(); break;
      case 'sellCar': this.renderSellCar(); break;
      case 'raceSelect': this.renderRaceSelect(); break;
      case 'racing': this.renderRacing(); break;
      case 'results': this.renderResults(); break;
      case 'saveScreen': this.renderer.drawSaveLoadScreen('save'); break;
      case 'loadScreen': this.renderer.drawSaveLoadScreen('load'); break;
    }

    // Always draw message overlay and muted indicator
    this.renderer.drawMessage(this.message);
    this.renderer.drawMutedIndicator(this.audio.muted);
  }

  // ---- TITLE SCREEN RENDERER ----

  // ---- CLASSIFIEDS SCREEN RENDERER ----
  renderClassifieds() {
    this.renderer.clear(C.darkBg);

    // Newspaper header
    this.renderer.drawNewspaperHeader();

    // Cash display - top right, clearly visible
    this.renderer.text(`Cash: $${this.cash}`, W - 80, 24, C.green);

    // Ad listings
    const startY = 25;
    for (let i = 0; i < this.classifiedAds.length; i++) {
      const ad = this.classifiedAds[i];
      const ly = startY + i * 18;

      if (ly > H - 30) break; // Don't draw off-screen ads

      const hover = this.input.mouseX >= 5 && this.input.mouseX <= W - 10 &&
                    this.input.mouseY >= ly && this.input.mouseY <= ly + 16;

      if (hover) {
        this.renderer.rect(5, ly, W - 10, 16, '#2a2a3e');
      }

      // Ad text: Year Name - Price - Condition%
      const nameStr = `${ad.template.year} ${ad.template.name}`;
      this.renderer.text(nameStr, 8, ly + 2, hover ? C.white : C.lightGray);

      // Asking price - ensure it displays correctly
      const price = ad.askingPrice || 0;
      this.renderer.text(`$${price}`, W - 55, ly + 2, hover ? C.yellow : C.green);

      // Condition indicator
      const condColor = ad.condition > 70 ? C.green : (ad.condition > 40 ? C.orange : C.red);
      this.renderer.text(`${ad.condition}%`, W - 55, ly + 12, condColor);

      // Seller name
      this.renderer.text(ad.sellerName, 8, ly + 12, C.darkGray);

      // Inspected indicator
      if (ad.inspected) {
        this.renderer.text('[INSPECTED]', 100, ly + 2, C.cyan);
      }

      // Hidden issues hint (if inspected)
      if (ad.inspected && ad.hiddenIssues.length > 0) {
        this.renderer.text(`⚠ ${ad.hiddenIssues[0]}`, 100, ly + 12, C.red);
      }

      // Hover tooltip
      if (hover) {
        this.renderer.drawTooltip(this.input.mouseX, ly - 10, `Click to inspect`);
      }
    }

    // Back button
    this.renderer.button(5, 182, 35, 14, 'BACK',
      this.input.mouseX >= 5 && this.input.mouseX <= 40 && this.input.mouseY >= 182 && this.input.mouseY <= 196);

    // Ad count
    this.renderer.text(`${this.classifiedAds.length} ads`, W - 50, 184, C.darkGray);
  }

  // ---- INSPECT SCREEN RENDERER ----
  renderInspect() {
    this.renderer.clear(C.darkBg);

    if (this.selectedAd < 0 || !this.classifiedAds[this.selectedAd]) {
      this.renderer.text('No car selected', 105, 30, C.red);
      this.renderer.button(5, 182, 40, 14, 'BACK',
        this.input.mouseX >= 5 && this.input.mouseX <= 44 && this.input.mouseY >= 182 && this.input.mouseY <= 196);
      return;
    }

    const ad = this.classifiedAds[this.selectedAd];

    // Header
    this.renderer.panel(0, 0, W, 18, C.panelBg, C.panelBorder);
    this.renderer.textCentered('CAR INSPECTION', W / 2, 10, C.yellow);

    // Car drawing
    this.renderer.drawCar(80, 35, ad.template.colorIdx, ad.template.bodyStyle);

    // Car details panel
    this.renderer.panel(5, 60, W - 10, 80, C.panelBg, C.panelBorder);

    this.renderer.text(`${ad.template.year} ${ad.template.name}`, 10, 68, C.yellow);
    this.renderer.text(`Seller: ${ad.sellerName}`, 10, 78, C.lightGray);
    this.renderer.text(`Mileage: ${ad.mileage.toLocaleString()} mi`, 10, 88, C.lightGray);
    this.renderer.text(`Condition: ${ad.condition}%`, 10, 98, ad.condition > 60 ? C.green : C.orange);
    this.renderer.text(`HP: ${Math.round(ad.template.horsepower * ad.condition / 100)}`, 10, 108, C.text);
    this.renderer.text(`Weight: ${ad.template.weight} lbs`, 10, 118, C.text);
    this.renderer.text(`Grip: ${ad.template.grip}`, 10, 128, C.text);
    this.renderer.text(`Reliability: ${Math.round(ad.template.reliability * ad.condition / 100)}%`, 10, 138, C.text);

    // Asking price - clearly displayed
    const askingPrice = ad.askingPrice || 0;
    this.renderer.text(`Asking Price: $${askingPrice}`, W - 100, 68, C.yellow);

    // Seller firmness indicator
    const firmLabel = ad.sellerFirmness > 70 ? 'Very Firm' : (ad.sellerFirmness > 45 ? 'Moderate' : 'Easygoing');
    this.renderer.text(`Negotiation: ${firmLabel}`, W - 100, 78, ad.sellerFirmness > 60 ? C.red : C.green);

    // Hidden issues (if inspected)
    if (ad.inspected && ad.hiddenIssues.length > 0) {
      this.renderer.text('KNOWN ISSUES:', 10, 148, C.red);
      for (let j = 0; j < ad.hiddenIssues.length; j++) {
        this.renderer.text(`- ${ad.hiddenIssues[j]}`, 15, 158 + j * 10, C.orange);
      }
    }

    // Counter offer display
    if (ad.counterOffer) {
      this.renderer.panel(5, 162, W - 10, 18, '#2a1a1a', C.red);
      this.renderer.text(`${ad.sellerName} offers: $${ad.counterOffer}`, 10, 172, C.yellow);
    }

    // Buttons at bottom
    const btnY = 182;

    // Inspect button (reveals hidden issues)
    const inspectHover = this.input.mouseX >= 5 && this.input.mouseX <= 60 && this.input.mouseY >= btnY && this.input.mouseY <= btnY + 14;
    this.renderer.button(5, btnY, 55, 14, ad.inspected ? 'INSPECTED' : 'INSPECT', inspectHover);

    // Offer button (80% of asking)
    const offerAmount = Math.round(askingPrice * 0.8);
    const offerHover = this.input.mouseX >= 70 && this.input.mouseX <= 130 && this.input.mouseY >= btnY && this.input.mouseY <= btnY + 14;
    this.renderer.button(70, btnY, 60, 14, `OFFER $${offerAmount}`, offerHover);

    // Buy at asking price
    const buyHover = this.input.mouseX >= 140 && this.input.mouseX <= 210 && this.input.mouseY >= btnY && this.input.mouseY <= btnY + 14;
    this.renderer.button(140, btnY, 70, 14, `BUY $${askingPrice}`, buyHover);

    // Walk away
    const walkHover = this.input.mouseX >= 220 && this.input.mouseX <= 315 && this.input.mouseY >= btnY && this.input.mouseY <= btnY + 14;
    this.renderer.button(220, btnY, 95, 14, 'WALK AWAY', walkHover);

    // Cash reminder
    this.renderer.text(`Your cash: $${this.cash}`, 5, btnY - 2, C.green);
  }

  // ---- PARTS SHOP SCREEN RENDERER ----
  renderPartsShop() {
    this.renderer.clear(C.darkBg);

    // Header
    this.renderer.drawPartsShopHeader();

    // Cash display
    this.renderer.text(`Cash: $${this.cash}`, W - 70, 24, C.green);

    // Parts list
    const startY = 25;
    for (let i = 0; i < this.availableParts.length; i++) {
      const part = this.availableParts[i];
      const ly = startY + i * 16;

      if (ly > H - 30) break;

      const hover = this.input.mouseX >= 5 && this.input.mouseX <= W - 10 &&
                    this.input.mouseY >= ly && this.input.mouseY <= ly + 14;

      if (hover) {
        this.renderer.rect(5, ly, W - 10, 14, '#2a2a3e');
      }

      // Check if already installed
      const installed = this.currentCar && this.currentCar.parts[part.id];

      if (installed) {
        this.renderer.text(`✓ ${part.name}`, 8, ly + 2, C.green);
        this.renderer.text(`INSTALLED`, W - 65, ly + 2, C.darkGray);
      } else {
        this.renderer.text(part.name, 8, ly + 2, hover ? C.white : C.lightGray);
        this.renderer.text(`$${part.cost}`, W - 50, ly + 2, hover ? C.yellow : C.green);

        // Stats preview
        let stats = '';
        if (part.hpBonus) stats += `+${part.hpBonus}HP `;
        if (part.gripBonus) stats += `+${part.gripBonus}GRIP `;
        if (part.relBonus) stats += `+${part.relBonus}REL `;
        if (part.weightBonus) stats += `${part.weightBonus}WGT`;
        this.renderer.text(stats, 8, ly + 12, C.darkGray);
      }

      if (hover && !installed) {
        this.renderer.drawTooltip(this.input.mouseX, ly - 10, `Click to install`);
      }
    }

    // Back button
    this.renderer.button(5, 182, 35, 14, 'BACK',
      this.input.mouseX >= 5 && this.input.mouseX <= 40 && this.input.mouseY >= 182 && this.input.mouseY <= 196);
  }

  // ---- INSTALL SCREEN RENDERER ----
  renderInstall() {
    this.renderer.clear(C.darkBg);

    // Header
    this.renderer.drawInstallHeader();

    if (this.selectedPartIdx < 0 || !this.availableParts[this.selectedPartIdx]) {
      this.renderer.text('No part selected', 105, 30, C.red);
      this.renderer.button(80, 182, 70, 14, 'CANCEL',
        this.input.mouseX >= 80 && this.input.mouseX <= 150 && this.input.mouseY >= 182 && this.input.mouseY <= 196);
      return;
    }

    const part = this.availableParts[this.selectedPartIdx];

    // Part details
    this.renderer.panel(20, 25, W - 40, 60, C.panelBg, C.panelBorder);
    this.renderer.textCentered(part.name, W / 2, 35, C.yellow);
    this.renderer.textCentered(`Cost: $${part.cost}`, W / 2, 50, C.green);

    // Stats
    let stats = [];
    if (part.hpBonus) stats.push(`+${part.hpBonus} Horsepower`);
    if (part.gripBonus) stats.push(`+${part.gripBonus} Grip`);
    if (part.relBonus) stats.push(`+${part.relBonus} Reliability`);
    if (part.relPenalty) stats.push(`${part.relPenalty} Reliability`);
    if (part.weightBonus) stats.push(`${part.weightBonus > 0 ? '+' : ''}${part.weightBonus} Weight`);

    for (let i = 0; i < stats.length; i++) {
      this.renderer.textCentered(stats[i], W / 2, 65 + i * 10, C.text);
    }

    // Car preview with part effect
    if (this.currentCar) {
      this.renderer.drawCar(100, 105, this.currentCar.colorIdx, this.currentCar.bodyStyle);
    }

    // Buttons
    const btnY = 182;
    this.renderer.button(5, btnY, 65, 14, 'INSTALL',
      this.input.mouseX >= 5 && this.input.mouseX <= 70 && this.input.mouseY >= btnY && this.input.mouseY <= btnY + 14);

    this.renderer.button(80, btnY, 70, 14, 'CANCEL',
      this.input.mouseX >= 80 && this.input.mouseX <= 150 && this.input.mouseY >= btnY && this.input.mouseY <= btnY + 14);

    // Cash reminder
    this.renderer.text(`Cash: $${this.cash}`, 160, btnY + 2, C.green);
  }

    const btnY = 182;
    this.renderer.button(5, btnY, 75, 14, 'SELL CAR',
      this.input.mouseX >= 5 && this.input.mouseX <= 80 && this.input.mouseY >= btnY && this.input.mouseY <= btnY + 14);

    this.renderer.button(90, btnY, 70, 14, 'CANCEL',
      this.input.mouseX >= 90 && this.input.mouseX <= 160 && this.input.mouseY >= btnY && this.input.mouseY <= btnY + 14);
  }

  // ---- RACE SELECT SCREEN RENDERER ----
  renderRaceSelect() {
    this.renderer.clear(C.darkBg);

    this.renderer.text('RACE SELECTION', 100, 3, C.yellow);

    if (!this.currentCar) {
      this.renderer.text('You need a car to race!', 90, 30, C.red);
      this.renderer.text('Buy one from classifieds first.', 75, 42, C.lightGray);
    } else {
      this.renderer.text(`${this.currentCar.year} ${this.currentCar.name}`, 10, 22, C.yellow);
      this.renderer.text(`HP:${this.currentCar.horsepower} PERF:${this.currentCar.getPerformanceRating()}`, 10, 32, C.lightGray);
    }

    // Race list
    const startY = 50;
    for (let i = 0; i < RACES.length; i++) {
      const race = RACES[i];
      const ly = startY + i * 20;

      if (ly > H - 30) break;

      const unlocked = this.reputation >= race.minRep;
      const hover = this.input.mouseX >= 5 && this.input.mouseX <= W - 10 &&
                    this.input.mouseY >= ly && this.input.mouseY <= ly + 18;

      if (hover) {
        this.renderer.rect(5, ly, W - 10, 18, unlocked ? '#2a2a3e' : '#1a1a2e');
      }

      if (unlocked) {
        this.renderer.text(race.name, 10, ly + 2, hover ? C.white : C.lightGray);
        this.renderer.text(`Purse: $${race.purse}`, 10, ly + 12, C.yellow);
        this.renderer.text(`Diff:`, W - 80, ly + 2, C.lightGray);
        this.renderer.drawStars(W - 65, ly + 2, race.difficulty, 7);
      } else {
        this.renderer.text(`LOCKED - ${race.name}`, 10, ly + 2, C.darkGray);
        this.renderer.text(`Need ${race.minRep} REP`, 10, ly + 12, C.darkGray);
      }

      if (hover && unlocked) {
        this.renderer.drawTooltip(this.input.mouseX, ly - 10, `Click to race!`);
      }
    }

    // Back button
    this.renderer.button(5, 182, 40, 14, 'BACK',
      this.input.mouseX >= 5 && this.input.mouseX <= 44 && this.input.mouseY >= 182 && this.input.mouseY <= 196);

    // Reputation display
    this.renderer.text(`Reputation: ${this.reputation}`, 120, 184, C.lightGray);
    this.renderer.text(`Cash: $${this.cash}`, 230, 184, C.green);
  }

  // ---- RACING SCREEN RENDERER ----
  renderRacing() {
    this.renderer.drawRaceBackground();

    const race = RACES[this.selectedRace];

    // Race name
    this.renderer.text(race.name, 100, 5, C.yellow);

    // Countdown
    if (this.racePhase === 'countdown') {
      const countNum = Math.ceil(this.raceTimer / 60);
      if (countNum > 0) {
        this.renderer.text(countNum.toString(), 150, 80, C.yellow, 24);
      } else {
        this.renderer.text('GO!', 140, 80, C.green, 20);
      }
    }

    // Player car (bottom lane)
    const playerX = 20 + Math.floor(this.playerProgress * (W - 60));
    this.renderer.drawCar(playerX, 155, this.currentCar ? this.currentCar.colorIdx : 0,
      this.currentCar ? this.currentCar.bodyStyle : 'coupe');

    // Opponent car (top lane)
    const oppX = 20 + Math.floor(this.opponentProgress * (W - 60));
    this.renderer.drawCar(oppX, 130, rand(0, CAR_COLORS.length - 1), 'muscle');

    // Lane labels
    this.renderer.text('YOU', 5, 158, C.green);
    this.renderer.text('OPP', 5, 133, C.red);

    // Progress bars
    this.renderer.progressBar(80, 175, W - 90, 6, this.playerProgress * 100, 100, C.green);
    this.renderer.progressBar(80, 125, W - 90, 6, this.opponentProgress * 100, 100, C.red);

    // Finish line
    this.renderer.rect(W - 35, 120, 3, 60, '#ffffff');
    for (let i = 0; i < 30; i++) {
      this.renderer.rect(W - 35 + (i % 2 === 0 ? 0 : 1), 120 + i * 2, 1, 1, '#ffffff');
    }

    // Race result overlay
    if (this.racePhase === 'finished') {
      this.renderer.rect(0, 0, W, H, 'rgba(0,0,0,0.7)');

      if (this.raceResult === 'win') {
        this.renderer.text('YOU WIN!', 120, 80, C.yellow, 16);
        const prize = Math.round(race.purse * (0.8 + Math.random() * 0.4));
        this.renderer.text(`Prize: $${prize}`, 120, 100, C.green);
      } else if (this.raceResult === 'breakdown') {
        this.renderer.text('BROKEN DOWN!', 105, 80, C.red, 14);
        this.renderer.text('Your car gave up!', 105, 98, C.lightGray);
      } else {
        this.renderer.text('YOU LOSE', 120, 80, C.red, 16);
        this.renderer.text('Better luck next time.', 95, 98, C.lightGray);
      }

      if (Math.floor(this.frameCount / 20) % 2 === 0) {
        this.renderer.text('[ CLICK TO CONTINUE ]', 85, 130, C.yellow);
      }
    }

    // Speed display
    if (this.racePhase === 'racing') {
      const speed = Math.floor(this.playerProgress * 2.5 + rand(0, 10));
      this.renderer.text(`${speed} MPH`, W - 65, 182, C.lightGray);
    }
  }

  // ---- RESULTS SCREEN RENDERER ----
  renderResults() {
    this.renderer.clear(C.darkBg);

    const race = RACES[this.selectedRace];

    this.renderer.text('RACE RESULTS', 105, 20, C.yellow);
    this.renderer.text(race.name, 115, 38, C.lightGray);

    if (this.raceResult === 'win') {
      this.renderer.text('WINNER!', 130, 60, C.green, 14);
      const prize = Math.round(race.purse * (0.8 + Math.random() * 0.4));
      this.renderer.text(`Prize Money: $${prize}`, 100, 80, C.yellow);
      this.renderer.text(`Reputation: +${race.difficulty * 2}`, 100, 95, C.lightGray);
    } else if (this.raceResult === 'breakdown') {
      this.renderer.text('BROKEN DOWN', 105, 60, C.red, 14);
      this.renderer.text('Your car broke down during the race.', 60, 80, C.lightGray);
      this.renderer.text('Reputation: -2', 110, 95, C.red);
    } else {
      this.renderer.text('DEFEATED', 120, 60, C.red, 14);
      this.renderer.text('The opponent was faster.', 95, 80, C.lightGray);
      const consolation = Math.round(race.purse * 0.1);
      this.renderer.text(`Consolation: $${consolation}`, 100, 95, C.yellow);
    }

    // Stats summary
    this.renderer.panel(40, 120, W - 80, 50, C.darkBg, C.panelBorder);
    this.renderer.text('CAREER STATS', 120, 125, C.accent);
    this.renderer.text(`Total Cash: $${this.cash}`, 50, 140, C.yellow);
    this.renderer.text(`Reputation: ${this.reputation}`, 50, 152, C.lightGray);
    this.renderer.text(`Races Won: ${this.racesWon}`, 180, 140, C.lightGray);
    this.renderer.text(`Cars Owned: ${this.carsOwned}`, 180, 152, C.lightGray);

    if (Math.floor(this.frameCount / 20) % 2 === 0) {
      this.renderer.text('[ CLICK TO CONTINUE ]', 85, 178, C.yellow);
    }
  }

  // ---- MAIN LOOP ----
  gameLoop(timestamp) {
    this.update();
    this.render();
    requestAnimationFrame((t) => this.gameLoop(t));
  }

  start() {
    // Try to load saved game
    const raw = localStorage.getItem('streetGarage89');
    if (raw) {
      try {
        const data = JSON.parse(raw);
        this.cash = data.cash || 3500;
        this.reputation = data.reputation || 0;
        this.carsOwned = data.carsOwned || 1;
        this.racesWon = data.racesWon || 0;
        this.day = data.day || 1;
        if (data.currentCar) {
          const carData = data.currentCar;
          this.currentCar = new Car(CAR_TEMPLATES[0], carData.condition);
          Object.assign(this.currentCar, carData);
        }
      } catch(e) {}
    }

    this.gameLoop(0);
  }
}

// ============================================================
// START THE GAME
// ============================================================
const game = new Game();
game.start();

</script>
</body>
</html>
