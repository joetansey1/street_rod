// ============================================================
// AUDIO MANAGER - Web Audio API retro sounds
// ============================================================
class AudioManager {
  constructor() {
    this.ctx = null;
    this.muted = false;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }

  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }

  play(type) {
    if (this.muted || !this.ctx) return;
    this.resume();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);

    switch(type) {
      case 'click':
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
        break;
      case 'select':
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.setValueAtTime(900, now + 0.05);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
        break;
      case 'cash':
        osc.type = 'square';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.setValueAtTime(1600, now + 0.08);
        osc.frequency.setValueAtTime(2000, now + 0.16);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'wrench':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'bolt':
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now); osc.stop(now + 0.08);
        break;
      case 'countdown':
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, now);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'go':
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'win':
        osc.type = 'square';
        [523,659,784,1047].forEach((f,i) => {
          osc.frequency.setValueAtTime(f, now + i*0.12);
        });
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        break;
      case 'lose':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
      case 'engine':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(60, now);
        osc.frequency.linearRampToValueAtTime(120, now + 0.3);
        osc.frequency.linearRampToValueAtTime(60, now + 0.6);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        break;
      case 'error':
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
    }
  }

  toggleMute() { this.muted = !this.muted; return this.muted; }
}

// ============================================================
// INPUT HANDLER
// ============================================================
class Input {
  constructor(canvas) {
    this.canvas = canvas;
    this.mouseX = 0; this.mouseY = 0;
    this.clicked = false; this.heldKeys = {};
    this.spacePressed = false;

    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      this.mouseX = Math.floor((e.clientX - r.left) / r.width * W);
      this.mouseY = Math.floor((e.clientY - r.top) / r.height * H);
    });

    canvas.addEventListener('mousedown', e => { this.clicked = true; audio.resume(); });
    canvas.addEventListener('mouseup', () => {});

    window.addEventListener('keydown', e => {
      this.heldKeys[e.key.toLowerCase()] = true;
      if (e.code === 'Space') { this.spacePressed = true; e.preventDefault(); }
    });
    window.addEventListener('keyup', e => { this.heldKeys[e.key.toLowerCase()] = false; });
  }

  clearClick() { this.clicked = false; }
  clearSpace() { this.spacePressed = false; }
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
class Particles {
  constructor() { this.particles = []; }

  emit(x, y, count, color, speed) {
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x, y, vx: (Math.random()-0.5)*speed*2, vy: -Math.random()*speed,
        life: 1, color, size: Math.random()*2+1
      });
    }
  }

  update() {
    for (let i = this.particles.length-1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx; p.y += p.vy; p.life -= 0.03;
      if (p.life <= 0) this.particles.splice(i, 1);
    }
  }

  draw(ctx) {
    for (const p of this.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// RENDERER - All drawing utilities
// ============================================================
class Renderer {
  text(str, x, y, color, size) {
    ctx.fillStyle = color || C.lightGray;
    ctx.font = (size||4) + 'px monospace';
    ctx.fillText(str, x, y);
  }

  textCentered(str, cx, y, color, size) {
    ctx.fillStyle = color || C.lightGray;
    ctx.font = (size||4) + 'px monospace';
    const w = ctx.measureText(str).width;
    ctx.fillText(str, cx - w/2, y);
  }

  button(x, y, w, h, label, hover) {
    ctx.fillStyle = hover ? '#556' : '#334';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = hover ? C.accent : '#556';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
    this.textCentered(label, x + w/2, y + h/2 + 1.5, hover ? C.white : C.lightGray);
    return hover;
  }

  progressBar(x, y, w, h, val, max, color) {
    ctx.fillStyle = '#222';
    ctx.fillRect(x, y, w, h);
    const bw = Math.max(0, (val/max) * w);
    ctx.fillStyle = color || C.green;
    ctx.fillRect(x, y, bw, h);
    ctx.strokeStyle = '#555';
    ctx.strokeRect(x, y, w, h);
  }

  drawTooltip(mx, my, text) {
    const lines = text.split('\n');
    const tw = Math.max(...lines.map(l => l.length)) * 5 + 6;
    const th = lines.length * 6 + 4;
    let tx = mx - tw/2, ty = my - th;
    if (tx < 2) tx = 2;
    if (ty < 2) ty = my + 10;
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(tx, ty, tw, th);
    ctx.strokeStyle = C.accent;
    ctx.strokeRect(tx, ty, tw, th);
    for (let i = 0; i < lines.length; i++) {
      this.text(lines[i], tx+3, ty+6+i*6, C.yellow);
    }
  }

  // Draw a pixel art car side-view on the garage lift
  drawCarOnLift(cx, cy, colorIdx, bodyStyle) {
    const col = CAR_COLORS[colorIdx % CAR_COLORS.length];

    // Lift posts
    ctx.fillStyle = '#666';
    ctx.fillRect(cx - 50, cy + 18, 4, 25);
    ctx.fillRect(cx + 46, cy + 18, 4, 25);
    // Lift platform
    ctx.fillStyle = '#777';
    ctx.fillRect(cx - 52, cy + 16, 104, 3);
    // Lift cross beam
    ctx.fillStyle = '#555';
    ctx.fillRect(cx - 20, cy + 38, 40, 3);

    // Car body based on style
    ctx.fillStyle = col;
    if (bodyStyle === 'muscle' || bodyStyle === 'fastback') {
      // Lower body
      ctx.fillRect(cx - 40, cy - 2, 80, 16);
      // Cabin
      ctx.fillRect(cx - 20, cy - 14, 35, 12);
      // Roof slope (fastback) or flat (muscle)
      if (bodyStyle === 'fastback') {
        ctx.fillRect(cx - 10, cy - 16, 25, 2);
        ctx.fillRect(cx + 10, cy - 14, 5, 2);
      } else {
        ctx.fillRect(cx - 18, cy - 16, 30, 2);
      }
      // Hood scoop
      ctx.fillRect(cx - 38, cy - 4, 12, 2);
      // Front bumper
      ctx.fillStyle = '#999';
      ctx.fillRect(cx - 42, cy + 10, 6, 3);
      // Rear bumper
      ctx.fillRect(cx + 38, cy + 10, 6, 3);
    } else if (bodyStyle === 'sport') {
      ctx.fillRect(cx - 38, cy, 76, 14);
      ctx.fillRect(cx - 15, cy - 12, 30, 12);
      ctx.fillRect(cx - 12, cy - 14, 24, 2);
      ctx.fillStyle = '#999';
      ctx.fillRect(cx - 40, cy + 10, 5, 3);
      ctx.fillRect(cx + 36, cy + 10, 5, 3);
    } else if (bodyStyle === 'sedan') {
      ctx.fillRect(cx - 42, cy + 1, 84, 13);
      ctx.fillRect(cx - 25, cy - 10, 28, 11);
      ctx.fillRect(cx + 5, cy - 6, 20, 7);
      ctx.fillStyle = '#999';
      ctx.fillRect(cx - 44, cy + 10, 6, 3);
      ctx.fillRect(cx + 40, cy + 10, 6, 3);
    } else { // compact
      ctx.fillRect(cx - 32, cy + 2, 64, 12);
      ctx.fillRect(cx - 15, cy - 8, 26, 10);
      ctx.fillRect(cx - 12, cy - 10, 20, 2);
      ctx.fillStyle = '#999';
      ctx.fillRect(cx - 34, cy + 10, 5, 2);
      ctx.fillRect(cx + 31, cy + 10, 5, 2);
    }

    // Windows (dark)
    ctx.fillStyle = '#1a3050';
    if (bodyStyle === 'muscle') {
      ctx.fillRect(cx - 18, cy - 12, 14, 9);
      ctx.fillRect(cx - 2, cy - 12, 14, 9);
    } else if (bodyStyle === 'fastback') {
      ctx.fillRect(cx - 18, cy - 12, 12, 9);
      ctx.fillRect(cx - 4, cy - 12, 10, 9);
    } else if (bodyStyle === 'sport') {
      ctx.fillRect(cx - 13, cy - 10, 12, 9);
      ctx.fillRect(cx + 1, cy - 10, 12, 9);
    } else if (bodyStyle === 'sedan') {
      ctx.fillRect(cx - 23, cy - 8, 10, 8);
      ctx.fillRect(cx + 7, cy - 4, 16, 5);
    } else {
      ctx.fillRect(cx - 13, cy - 6, 10, 7);
      ctx.fillRect(cx - 1, cy - 6, 12, 7);
    }

    // Wheels
    ctx.fillStyle = '#222';
    ctx.fillRect(cx - 30, cy + 12, 14, 8);
    ctx.fillRect(cx + 18, cy + 12, 14, 8);
    // Hubcaps
    ctx.fillStyle = '#aaa';
    ctx.fillRect(cx - 26, cy + 14, 6, 4);
    ctx.fillRect(cx + 22, cy + 14, 6, 4);

    // Headlight
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(cx - 42, cy + 2, 3, 4);
    // Taillight
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(cx + 40, cy + 2, 3, 4);
  }

  // Draw a part icon for the install screen
  drawPartIcon(x, y, partId) {
    ctx.save();
    switch(partId) {
      case 'carb': // Carburetor - boxy with tubes
        ctx.fillStyle = '#888';
        ctx.fillRect(x+2, y+4, 16, 10);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(x+4, y, 4, 6);
        ctx.fillRect(x+12, y, 4, 6);
        ctx.fillStyle = '#666';
        ctx.fillRect(x+1, y+8, 2, 4);
        break;
      case 'intake': // Intake - curved pipe
        ctx.fillStyle = '#999';
        ctx.fillRect(x+2, y+6, 18, 4);
        ctx.fillStyle = '#bbb';
        ctx.fillRect(x+2, y+4, 6, 8);
        ctx.fillStyle = '#777';
        ctx.fillRect(x+14, y+8, 6, 2);
        break;
      case 'exhaust': // Exhaust - pipes
        ctx.fillStyle = '#777';
        ctx.fillRect(x+2, y+8, 18, 3);
        ctx.fillStyle = '#999';
        ctx.fillRect(x+2, y+4, 3, 8);
        ctx.fillRect(x+15, y+6, 5, 4);
        break;
      case 'cam': // Camshaft - lobed shaft
        ctx.fillStyle = '#888';
        ctx.fillRect(x+2, y+7, 16, 3);
        ctx.fillStyle = '#aaa';
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(x+3+i*4, y+5, 2, 7);
        }
        break;
      case 'tires': // Tires - two circles approximated as squares
        ctx.fillStyle = '#333';
        ctx.fillRect(x+2, y+2, 8, 14);
        ctx.fillRect(x+12, y+2, 8, 14);
        ctx.fillStyle = '#555';
        ctx.fillRect(x+4, y+4, 4, 10);
        ctx.fillRect(x+14, y+4, 4, 10);
        break;
      case 'trans': // Transmission - box with gears
        ctx.fillStyle = '#777';
        ctx.fillRect(x+2, y+4, 16, 10);
        ctx.fillStyle = '#999';
        ctx.fillRect(x+4, y+6, 5, 6);
        ctx.fillRect(x+11, y+6, 5, 6);
        break;
      case 'diff': // Differential - circular housing
        ctx.fillStyle = '#888';
        ctx.fillRect(x+4, y+2, 12, 14);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(x+6, y+4, 8, 10);
        ctx.fillStyle = '#666';
        ctx.fillRect(x+8, y+7, 4, 4);
        break;
      case 'weight': // Weight reduction - feather/light symbol
        ctx.fillStyle = '#ccc';
        ctx.fillRect(x+8, y+2, 2, 14);
        ctx.fillStyle = '#eee';
        ctx.fillRect(x+6, y+2, 6, 3);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(x+4, y+6, 2, 3);
        ctx.fillRect(x+12, y+8, 2, 3);
        break;
      case 'cooling': // Radiator - fins
        ctx.fillStyle = '#668';
        ctx.fillRect(x+2, y+2, 16, 14);
        ctx.fillStyle = '#88a';
        for (let i = 0; i < 5; i++) {
          ctx.fillRect(x+4, y+3+i*2.5, 12, 1);
        }
        break;
      case 'brakes': // Brake disc - circle with caliper
        ctx.fillStyle = '#888';
        ctx.fillRect(x+4, y+2, 12, 14);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(x+6, y+4, 8, 10);
        ctx.fillStyle = '#c44';
        ctx.fillRect(x+2, y+6, 4, 6);
        break;
      case 'supercharger': // Blower - large box on top
        ctx.fillStyle = '#777';
        ctx.fillRect(x+2, y+6, 18, 10);
        ctx.fillStyle = '#999';
        ctx.fillRect(x+4, y+2, 14, 6);
        ctx.fillStyle = '#bbb';
        ctx.fillRect(x+7, y, 8, 4);
        break;
      case 'nitrous': // Nitrous bottle - cylinder
        ctx.fillStyle = '#4a8';
        ctx.fillRect(x+6, y+2, 8, 14);
        ctx.fillStyle = '#6c0';
        ctx.fillRect(x+7, y, 6, 4);
        ctx.fillStyle = '#fff';
        ctx.fillRect(x+8, y+6, 4, 2);
        break;
    }
    ctx.restore();
  }

  // Draw the garage background scene
  drawGarageBg() {
    // Floor
    ctx.fillStyle = '#2a2520';
    ctx.fillRect(0, 140, W, H-140);

    // Floor tiles
    ctx.fillStyle = '#332e28';
    for (let x = 0; x < W; x += 16) {
      for (let y = 140; y < H; y += 8) {
        if ((Math.floor(x/16) + Math.floor(y/8)) % 2 === 0) {
          ctx.fillRect(x, y, 16, 8);
        }
      }
    }

    // Oil stains on floor
    ctx.fillStyle = 'rgba(20,15,10,0.4)';
    ctx.fillRect(80, 165, 30, 12);
    ctx.fillRect(200, 175, 25, 10);
    ctx.fillRect(140, 185, 20, 8);

    // Back wall
    ctx.fillStyle = '#3a3530';
    ctx.fillRect(0, 20, W, 120);

    // Wall bricks
    ctx.fillStyle = '#453f38';
    for (let row = 0; row < 6; row++) {
      const y = 20 + row * 20;
      const offset = (row % 2) * 16;
      for (let col = -1; col < 12; col++) {
        ctx.fillRect(col * 32 + offset, y, 30, 18);
      }
    }

    // Shelves on wall
    ctx.fillStyle = '#5a4a30';
    ctx.fillRect(10, 40, 60, 3);
    ctx.fillRect(250, 40, 60, 3);

    // Items on left shelf
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(12, 30, 8, 10); // oil can

  // Draw a bolt being installed
  drawBolt(x, y, tight) {
    ctx.fillStyle = tight ? '#aaa' : '#888';
    // Bolt head (hex)
    ctx.fillRect(x-2, y-1, 5, 4);
    // Bolt shaft
    ctx.fillStyle = tight ? '#999' : '#777';
    ctx.fillRect(x, y+3, 1, tight ? 4 : 6);
    // Threads
    if (!tight) {
      ctx.fillStyle = '#666';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(x-1, y+4+i*2, 3, 1);
      }
    }
  }

  // Draw a wrench turning animation
  drawWrench(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = '#aaa';
    // Wrench handle
    ctx.fillRect(-1, -8, 3, 16);
    // Wrench head (C-shape)
    ctx.fillRect(-3, -10, 7, 4);
    ctx.fillRect(2, -9, 3, 2);
    ctx.restore();
  }

  // Draw a simple car on the road for racing
  drawRaceCar(x, y, colorIdx, bodyStyle) {
    const col = CAR_COLORS[colorIdx % CAR_COLORS.length];
    ctx.fillStyle = col;

    if (bodyStyle === 'muscle' || bodyStyle === 'fastback') {
      ctx.fillRect(x, y+2, 40, 8);
      ctx.fillRect(x+10, y-6, 18, 8);
    } else if (bodyStyle === 'sport') {
      ctx.fillRect(x, y+3, 38, 7);
      ctx.fillRect(x+8, y-4, 16, 7);
    } else if (bodyStyle === 'sedan') {
      ctx.fillRect(x, y+3, 42, 7);
      ctx.fillRect(x+10, y-5, 14, 8);
    } else {
      ctx.fillRect(x, y+3, 34, 6);
      ctx.fillRect(x+8, y-3, 14, 6);
    }

    // Windows
    ctx.fillStyle = '#1a3050';
    if (bodyStyle === 'muscle') {
      ctx.fillRect(x+12, y-4, 7, 5);
    } else {
      ctx.fillRect(x+10, y-3, 6, 4);
    }

    // Wheels
    ctx.fillStyle = '#222';
    ctx.fillRect(x+4, y+8, 7, 5);
    ctx.fillRect(x+29, y+8, 7, 5);

    // Headlight
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(x+39, y+4, 2, 2);
    // Taillight
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(x, y+4, 2, 2);
  }

  // Draw a simple opponent car silhouette
  drawOpponentCar(x, y) {
    ctx.fillStyle = '#445';
    ctx.fillRect(x, y+2, 38, 8);
    ctx.fillRect(x+10, y-5, 16, 7);
    ctx.fillStyle = '#2a3040';
    ctx.fillRect(x+12, y-3, 6, 5);
    ctx.fillStyle = '#222';
    ctx.fillRect(x+4, y+8, 7, 5);
    ctx.fillRect(x+27, y+8, 7, 5);
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(x+37, y+4, 2, 2);
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(x, y+4, 2, 2);
  }

  // Draw newspaper classifieds background
  drawNewspaperBg() {
    ctx.fillStyle = '#d4c8a0';
    ctx.fillRect(0, 0, W, H);

    // Paper texture lines
    ctx.fillStyle = 'rgba(180,170,140,0.3)';
    for (let y = 0; y < H; y += 4) {
      ctx.fillRect(0, y, W, 1);
    }

    // Header
    ctx.fillStyle = '#2a2015';
    ctx.fillRect(0, 0, W, 18);
    this.textCentered('THE DAILY GARAGE - CLASSIFIED ADS', W/2, 12, '#d4c8a0', 6);

    // Column lines
    ctx.strokeStyle = 'rgba(180,170,140,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W/2, 18);
    ctx.lineTo(W/2, H);
    ctx.stroke();
  }

  // Draw race selection map background
  drawRaceMapBg() {
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(0, 0, W, H);

    // Grid lines (map feel)
    ctx.strokeStyle = 'rgba(50,70,100,0.3)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 20) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 20) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Road lines
    ctx.strokeStyle = '#3a4050';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(40, H); ctx.lineTo(160, 80); ctx.lineTo(280, 40);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(80, H); ctx.lineTo(200, 100); ctx.lineTo(300, 60);
    ctx.stroke();

    // City blocks
    ctx.fillStyle = '#253040';
    ctx.fillRect(60, 120, 30, 25);
    ctx.fillRect(140, 90, 25, 30);
    ctx.fillRect(220, 60, 35, 20);
    ctx.fillRect(100, 160, 40, 20);
    ctx.fillRect(250, 130, 30, 25);
  }

  // Draw parts shop background
  drawPartsShopBg() {
    ctx.fillStyle = '#2a2520';
    ctx.fillRect(0, 0, W, H);

    // Shelf background
    ctx.fillStyle = '#3a3530';
    ctx.fillRect(0, 18, W, H-18);

    // Shelf lines
    ctx.fillStyle = '#5a4a30';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(0, 50 + i * 38, W, 2);
    }

    // Header bar
    ctx.fillStyle = '#1a1510';
    ctx.fillRect(0, 0, W, 18);
  }

  drawInstallBg() {

    // Darken slightly for focus on install area
    ctx.fillStyle = 'rgba(0,0,0,0.2)';

  // Draw title screen
  drawTitleScreen() {
    ctx.fillStyle = '#0a0a15';
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (let i = 0; i < 30; i++) {
      const sx = (i * 97 + Math.floor(Date.now()/1000) % W) % W;

      ctx.fillRect(sx, sy, 1, 1);

    // Title
    this.textCentered('STREET GARAGE', W/2, 50, C.accent, 14);

    this.textCentered('A Car Management Game', W/2, 85, C.lightGray);

    // Decorative car

  drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';

    this.textCentered('BUSTED!', W/2, 60, C.red, 14);

  // Draw victory screen (high reputation)
  drawVictory() {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, W, H);

    this.textCentered('LEGENDARY!', W/2, 60, C.yellow, 14);
    this.textCentered('You\'re the king of the streets!', W/2, 80, C.lightGray);
    this.textCentered(`Final Cash: $${game.cash}`, W/2, 100, C.green);

  // Draw difficulty selector
  drawDifficultyScreen() {
    ctx.fillStyle = '#0a0a15';
    ctx.fillRect(0, 0, W, H);

    this.textCentered('SELECT DIFFICULTY', W/2, 40, C.accent, 10);

    const difficulties = [
      {key:'easy', label:'EASY - Learning the ropes', desc:'Opponents are weaker, you have a real chance'},
      {key:'normal', label:'NORMAL - Street level', desc:'Fair competition, skill matters'},
      {key:'hard', label:'HARD - Pro circuit', desc:'Tough opponents, only the best survive'},
    ];

    for (let i = 0; i < difficulties.length; i++) {
      const d = difficulties[i];
      const y = 65 + i * 30;
      const hover = this.input.mouseX >= 80 && this.input.mouseX <= W-80 && this.input.mouseY >= y && this.input.mouseY <= y+24;
      const selected = game.difficulty === d.key;

      ctx.fillStyle = hover ? '#334' : (selected ? '#2a3a2a' : '#1a1a2e');
      ctx.fillRect(80, y, W-160, 24);
      ctx.strokeStyle = selected ? C.green : (hover ? C.accent : '#334');
      ctx.lineWidth = 1;
      ctx.strokeRect(80, y, W-160, 24);

      this.text(d.label, 90, y+10, selected ? C.green : (hover ? C.white : C.lightGray), 6);
      this.text(d.desc, 90, y+18, C.dimText);
    }

    this.textCentered('[ CLICK TO SELECT ]', W/2, 175, C.yellow);
    this.textCentered('Press M to mute audio', W/2, 190, C.dimText);
  }

  // Draw save/load screen
  drawSaveLoadScreen(mode) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, W, H);

    this.textCentered(mode === 'save' ? 'SAVE GAME' : 'LOAD GAME', W/2, 30, C.accent, 10);

    const raw = localStorage.getItem('streetGarage89');
    if (raw && mode === 'load') {
      try {
        const data = JSON.parse(raw);
        this.textCentered(`Cash: $${data.cash}  Rep: ${data.reputation}`, W/2, 55, C.green);
        this.textCentered(`Day: ${data.day}  Races Won: ${data.racesWon}`, W/2, 70, C.yellow);
        this.textCentered(`Car: ${data.currentCar ? data.currentCar.name : 'None'}`, W/2, 85, C.lightGray);
      } catch(e) {}
    }

    const hoverSave = this.input.mouseX >= 100 && this.input.mouseX <= 220 && this.input.mouseY >= 100 && this.input.mouseY <= 116;
    const hoverCancel = this.input.mouseX >= 100 && this.input.mouseX <= 220 && this.input.mouseY >= 130 && this.input.mouseY <= 146;

    if (mode === 'save') {
      this.button(100, 100, 120, 16, 'SAVE', hoverSave);
    } else {
      this.button(100, 100, 120, 16, 'LOAD', hoverSave);
    }
    this.button(100, 130, 120, 16, 'CANCEL', hoverCancel);
  }

  // Draw notification popup
  drawNotification(text, y) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(40, y-12, W-80, 20);
    ctx.strokeStyle = C.accent;
    ctx.lineWidth = 1;
    ctx.strokeRect(40, y-12, W-80, 20);
    this.textCentered(text, W/2, y+1, C.yellow);
  }

  // Draw stat bar with label
  drawStatBar(x, y, w, h, val, max, color, label) {
    this.text(label + ': ' + Math.floor(val), x, y-2, C.lightGray);
    this.progressBar(x, y, w, h, val, max, color);
  }

  // Draw a bolt hole position indicator
  drawBoltHole(x, y, active) {
    ctx.fillStyle = active ? C.yellow : '#555';
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
    if (active) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(x-1, y-1, 2, 2);
    }
  }

  // Draw wrench animation for bolt tightening
  drawWrenchAnim(x, y, progress) {
    const angle = progress * Math.PI * 4; // Two full rotations
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    // Wrench handle
    ctx.fillStyle = '#aaa';
    ctx.fillRect(-1, -10, 3, 20);
    // Wrench head
    ctx.fillStyle = '#ccc';
    ctx.fillRect(-3, -12, 7, 4);
    ctx.restore();
  }

  // Draw spark particles for bolt tightening
  drawSparks(x, y) {
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = `rgba(255,${150+Math.random()*105},0,${Math.random()})`;
      ctx.fillRect(x + (Math.random()-0.5)*10, y + (Math.random()-0.5)*10, 1, 1);
    }
  }

  // Draw a simple road for racing
  drawRoad(y) {
    ctx.fillStyle = '#333';
    ctx.fillRect(0, y, W, 20);

    // Road markings
    ctx.fillStyle = '#fff';
    for (let x = 0; x < W; x += 16) {
      ctx.fillRect(x, y + 9, 8, 2);
    }

    // Road edges
    ctx.fillStyle = '#555';
    ctx.fillRect(0, y-1, W, 2);
    ctx.fillRect(0, y+19, W, 2);
  }

  // Draw finish line
  drawFinishLine(x) {
    for (let i = 0; i < 24; i++) {
      ctx.fillStyle = (i % 2 === 0) ? '#fff' : '#000';
      ctx.fillRect(x, i * 1.5, 4, 2);
    }
  }

  // Draw a simple speedometer
  drawSpeedo(x, y, speed) {
    ctx.fillStyle = '#111';
    ctx.fillRect(x-20, y-15, 40, 30);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(x-20, y-15, 40, 30);

    // Speed arc
    ctx.strokeStyle = C.green;
    ctx.beginPath();
    ctx.arc(x, y+5, 12, Math.PI * 0.8, Math.PI * 0.8 + (speed/150) * Math.PI * 1.4);
    ctx.stroke();

    // Needle
    const angle = Math.PI * 0.8 + (speed/150) * Math.PI * 1.4;
    ctx.strokeStyle = C.red;
    ctx.beginPath();
    ctx.moveTo(x, y+5);
    ctx.lineTo(x + Math.cos(angle) * 10, y+5 + Math.sin(angle) * 10);
    ctx.stroke();

    this.textCentered(speed + 'MPH', x, y-8, C.lightGray);
  }

  // Draw a simple tachometer
  drawTacho(x, y, rpm) {
    ctx.fillStyle = '#111';
    ctx.fillRect(x-20, y-15, 40, 30);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(x-20, y-15, 40, 30);

    const rpmNorm = Math.min(rpm / 7000, 1);
    ctx.strokeStyle = rpmNorm > 0.8 ? C.red : C.yellow;
    ctx.beginPath();
    ctx.arc(x, y+5, 12, Math.PI * 0.8, Math.PI * 0.8 + rpmNorm * Math.PI * 1.4);
    ctx.stroke();

    const angle = Math.PI * 0.8 + rpmNorm * Math.PI * 1.4;
    ctx.strokeStyle = C.red;
    ctx.beginPath();
    ctx.moveTo(x, y+5);
    ctx.lineTo(x + Math.cos(angle) * 10, y+5 + Math.sin(angle) * 10);
    ctx.stroke();

    this.textCentered(Math.floor(rpm), x, y-8, C.lightGray);
  }

  // Draw a simple gear indicator
  drawGearIndicator(x, y, gear) {
    ctx.fillStyle = '#111';
    ctx.fillRect(x-8, y-6, 16, 12);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(x-8, y-6, 16, 12);

  // Draw a simple nitrous gauge (for nitrous cars)

  // ============================================================
  // MAIN GAME CLASS
  // ============================================================
  class Game {
    constructor() {
      this.state = 'title'; // title, difficulty, garage, classifieds, inspect, parts, install, races, racing, sell, tune, saveLoad
      this.cash = 3500;
      this.reputation = 0;
      this.day = 1;
      this.racesWon = 0;
      this.difficulty = 'easy'; // easy, normal, hard

      // Difficulty multipliers - key change for winnable racing
      this.diffMult = {
        easy:   { oppHpMod: 0.75, oppGripMod: 0.8, playerBonus: 1.2, breakdownChance: 0.3 },
        normal: { oppHpMod: 1.0,   oppGripMod: 1.0, playerBonus: 1.0, breakdownChance: 0.5 },
        hard:   { oppHpMod: 1.2,   oppGripMod: 1.15, playerBonus: 0.85, breakdownChance: 0.7 },
      };

      this.currentCar = null; // Will be set when player buys first car
      this.classifieds = [];
      this.partsShop = [];
      this.selectedClassifiedIdx = -1;
      this.selectedPartIdx = -1;
      this.selectedRace = 0;

      // Install state
      this.installPart = null;
      this.boltProgress = 0; // 0 to numBolts
      this.numBolts = 3;
      this.boltPositions = [];
      this.installAnimPhase = 0; // 0=placing, 1=bolting, 2=done
      this.wrenchAngle = 0;

      // Race state
      this.racePhase = 'countdown'; // countdown, racing, finished
      this.raceTimer = 180; // 3 seconds countdown at 60fps
      this.playerProgress = 0;
      this.opponentProgress = 0;
      this.raceResult = ''; // win, lose, breakdown

      // Notification
      this.notificationText = '';
      this.notificationTimer = 0;

      // Input
      this.input = new Input(canvas);

      // Renderer
      this.renderer = new Renderer();

      // Particles
      this.particles = new Particles();

      // Generate initial classifieds
      this.generateClassifieds();
      this.generatePartsShop();

      // Try load save
      const raw = localStorage.getItem('streetGarage89');
      if (raw) {
        try {
          const data = JSON.parse(raw);
          this.cash = data.cash || 3500;
          this.reputation = data.reputation || 0;
          this.day = data.day || 1;
          this.racesWon = data.racesWon || 0;
          this.difficulty = data.difficulty || 'easy';
          if (data.currentCar) {
            this.currentCar = data.currentCar;
            // Restore installed parts info
            if (data.installedParts) {
              this.currentCar.installedParts = data.installedParts;
            }
          }
        } catch(e) {}
      }

      // If no car, start at title/difficulty selection
      if (!this.currentCar) {
        this.state = 'difficulty';
      } else {
        this.state = 'garage';
      }

      // Start game loop
      requestAnimationFrame(() => this.gameLoop());
    }

    generateClassifieds() {
      this.classifieds = [];
      const count = 6 + Math.floor(Math.random() * 5); // 6-10 listings
      for (let i = 0; i < count; i++) {
        const tmpl = CAR_TEMPLATES[Math.floor(Math.random() * CAR_TEMPLATES.length)];
        const year = 1965 + Math.floor(Math.random() * 12); // 1965-1976
        const condition = 40 + Math.floor(Math.random() * 55); // 40-95%
        const hp = Math.floor(tmpl.baseHp * (condition / 100) * (0.85 + Math.random() * 0.3));
        const wt = tmpl.baseWt + Math.floor((Math.random() - 0.5) * 400);
        const grip = Math.floor(tmpl.grip * (condition / 100) * (0.8 + Math.random() * 0.4));
        const reliability = Math.floor(tmpl.reliability * (condition / 100) * (0.7 + Math.random() * 0.5));
        const hiddenIssues = Math.random() < 0.4 ? Math.floor(Math.random() * 30) : 0;
        const price = Math.floor((hp * 5 + wt * 0.3) * (condition / 100) * (0.7 + Math.random() * 0.6));
        const sellerName = SELLER_NAMES[Math.floor(Math.random() * SELLER_NAMES.length)];
        const sellerFirmness = SELLER_FIRMNESS[Math.floor(Math.random() * SELLER_FIRMNESS.length)];
        const mileage = 20000 + Math.floor(Math.random() * 150000);

        this.classifieds.push({
          year, name: tmpl.name, hp, wt, grip, reliability, condition,
          hiddenIssues, price, sellerName, sellerFirmness, mileage,
          colorIdx: tmpl.colorIdx, bodyStyle: tmpl.bodyStyle,
          value: Math.floor(price * 1.3), // Car is worth more than asking if in good shape
        });
      }
    }

    generatePartsShop() {
      this.partsShop = PARTS_DATA.map(p => ({
        ...p,
        cost: Math.floor(p.baseCost * (0.8 + Math.random() * 0.4)),
        installed: false,
      }));

      // Mark parts as already installed if current car has them
      if (this.currentCar && this.currentCar.installedParts) {
        for (const ip of this.currentCar.installedParts) {
          const shopPart = this.partsShop.find(p => p.id === ip);
          if (shopPart) shopPart.installed = true;
        }
      }
    }

    showNotification(text) {
      this.notificationText = text;
      this.notificationTimer = 120; // 2 seconds at 60fps
    }

    update() {
      this.particles.update();

      // Handle keyboard shortcuts
      if (this.input.heldKeys['c'] && this.state === 'garage') {
        this.state = 'classifieds';
        audio.play('click');
      }
      if (this.input.heldKeys['g'] && this.state !== 'garage' && this.currentCar) {
        this.state = 'garage';
        audio.play('click');
      }
      if (this.input.heldKeys['p'] && this.state === 'garage') {
        this.state = 'parts';
        audio.play('click');
      }
      if (this.input.heldKeys['r'] && this.state === 'garage') {
        this.state = 'races';
        audio.play('click');
      }
      if (this.input.heldKeys['s'] && this.currentCar) {
        this.state = 'saveLoad';
        audio.play('click');
      }
      if (this.input.heldKeys['l'] && this.currentCar) {
        this.state = 'saveLoad';
        audio.play('click');
      }
      if (this.input.heldKeys['m']) {
        const muted = audio.toggleMute();
        this.showNotification(muted ? 'Audio Muted' : 'Audio On');
      }

      // Handle mouse clicks per state
      if (this.input.clicked) {
        this.handleClick();
        this.input.clearClick();
      }

      // Handle spacebar for bolt installation
      if (this.input.spacePressed && this.state === 'install' && this.installAnimPhase === 1) {
        this.boltProgress++;
        audio.play('bolt');
        // Emit sparks at bolt position
        const bp = this.boltPositions[this.boltProgress - 1];
        if (bp) {
          this.particles.emit(bp.x, bp.y, 5, '#ff8', 2);
        }

        if (this.boltProgress >= this.numBolts) {
          // Installation complete!
          this.installAnimPhase = 2;
          audio.play('cash');

          // Apply part stats to car
          if (this.installPart && this.currentCar) {
            const stats = this.installPart.stats;
            if (stats.hp) this.currentCar.hp += stats.hp;
            if (stats.wt) this.currentCar.wt += stats.wt;
            if (stats.grip) this.currentCar.grip += stats.grip;
            if (stats.reliability) this.currentCar.reliability = Math.min(100, Math.max(5, this.currentCar.reliability + stats.reliability));

            // Mark as installed
            const shopPart = this.partsShop.find(p => p.id === this.installPart.id);
            if (shopPart) shopPart.installed = true;

            // Track installed parts on car
            if (!this.currentCar.installedParts) this.currentCar.installedParts = [];
            this.currentCar.installedParts.push(this.installPart.id);

            // Update car value
            this.currentCar.value += Math.floor(this.installPart.cost * 0.6);

            this.showNotification(`${this.installPart.name} installed!`);
          }
        }
      }
      this.input.clearSpace();

      // Race countdown and simulation
      if (this.state === 'racing') {
        if (this.racePhase === 'countdown') {
          this.raceTimer--;
          if (this.raceTimer === 120) audio.play('countdown'); // 3
          if (this.raceTimer === 60) audio.play('countdown'); // 2
          if (this.raceTimer === 1) audio.play('go'); // GO!

          if (this.raceTimer <= 0) {
            this.racePhase = 'racing';
          }
        }

        if (this.racePhase === 'racing') {
          // Calculate player performance based on car stats and difficulty
          const dm = this.diffMult[this.difficulty];
          const playerPower = (this.currentCar.hp / Math.max(1, this.currentCar.wt / 1000)) * dm.playerBonus;
          const playerGrip = this.currentCar.grip * dm.playerBonus;

          // Opponent stats based on race difficulty
          const race = RACES[this.selectedRace];
          const oppBaseHp = 120 + race.difficulty * 45; // Scales with difficulty
          const oppBaseWt = 2800 + race.difficulty * 200;
          const oppBaseGrip = 50 + race.difficulty * 8;

          // Apply difficulty modifiers to opponent
          const oppPower = (oppBaseHp * dm.oppHpMod) / Math.max(1, oppBaseWt / 1000);
          const oppGrip = oppBaseGrip * dm.oppGripMod;

          // Calculate per-frame progress with some randomness
          const playerSpeed = (playerPower * 0.003 + Math.random() * 0.15) * (playerGrip / 80);
          const oppSpeed = (oppPower * 0.003 + Math.random() * 0.15) * (oppGrip / 80);

          this.playerProgress += playerSpeed;
          this.opponentProgress += oppSpeed;

          // Check for breakdown based on reliability and difficulty
          const dm2 = this.diffMult[this.difficulty];
          if (Math.random() < (1 - this.currentCar.reliability / 100) * 0.002 * dm2.breakdownChance) {
            this.racePhase = 'finished';
            this.raceResult = 'breakdown';
            audio.play('lose');
            this.showNotification('Your car broke down!');
          }

          // Check if either crossed finish line
          if (this.playerProgress >= 1) {
            this.racePhase = 'finished';
            if (this.opponentProgress >= 1) {
              // Photo finish - whoever is ahead wins
              this.raceResult = this.playerProgress > this.opponentProgress ? 'win' : 'lose';
            } else {
              this.raceResult = 'win';
            }
            if (this.raceResult === 'win') {
              audio.play('win');
              const prize = Math.round(race.purse * (0.8 + Math.random() * 0.4));
              this.cash += prize;
              this.reputation += race.difficulty * 2;
              this.racesWon++;
              this.showNotification(`You won $${prize}!`);
            } else {
              audio.play('lose');
              this.reputation += 1; // Small rep for trying
              this.showNotification('You lost!');
            }
          } else if (this.opponentProgress >= 1) {
            this.racePhase = 'finished';
            this.raceResult = 'lose';
            audio.play('lose');
            this.reputation += 1;
            this.showNotification('You lost!');
          }

          // Emit exhaust particles
          if (Math.random() > 0.7) {
            const px = 20 + Math.floor(this.playerProgress * (W - 60));
            this.particles.emit(px + 5, 162, 1, '#555', 0.5);
          }
        }

        // Click to continue after race finishes
        if (this.racePhase === 'finished' && this.input.clicked) {
          this.state = 'garage';
          this.day++;
          // Refresh classifieds every 3 days
          if (this.day % 3 === 0) this.generateClassifieds();
          this.input.clearClick();
        }
      }

      // Notification timer
      if (this.notificationTimer > 0) this.notificationTimer--;
    }

    handleClick() {
      const mx = this.input.mouseX;
      const my = this.input.mouseY;

      switch(this.state) {
        case 'title':
          this.state = 'difficulty';
          audio.play('select');
          break;

        case 'difficulty': {
          const difficulties = ['easy', 'normal', 'hard'];
          for (let i = 0; i < difficulties.length; i++) {
            const y = 65 + i * 30;
            if (mx >= 80 && mx <= W-80 && my >= y && my <= y+24) {
              this.difficulty = difficulties[i];
              audio.play('select');
              if (this.currentCar) {
                this.state = 'garage';
              } else {
                this.state = 'classifieds';
                this.showNotification(`Difficulty: ${this.difficulty.toUpperCase()}`);
              }
            }
          }
          break;
        }

        case 'garage': {
          // Hotspot buttons at bottom of garage screen
          const btns = [
            {x: 5, y: 182, w: 40, h: 14, label: 'ADS', action: () => { this.state = 'classifieds'; audio.play('click'); }},
            {x: 50, y: 182, w: 40, h: 14, label: 'PARTS', action: () => { this.state = 'parts'; audio.play('click'); }},
            {x: 95, y: 182, w: 40, h: 14, label: 'RACES', action: () => { this.state = 'races'; audio.play('click'); }},
            {x: 140, y: 182, w: 40, h: 14, label: 'SELL', action: () => { this.state = 'sell'; audio.play('click'); }},
            {x: 185, y: 182, w: 40, h: 14, label: 'TUNE', action: () => { this.state = 'tune'; audio.play('click'); }},
            {x: 230, y: 182, w: 40, h: 14, label: 'SAVE', action: () => { this.state = 'saveLoad'; audio.play('click'); }},
          ];

          for (const b of btns) {
            if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) {
              b.action();
              return;
            }
          }

          // Click on car to inspect
          if (mx >= 100 && mx <= 220 && my >= 60 && my <= 140) {
            this.showNotification(`${this.currentCar.year} ${this.currentCar.name}`);
          }
          break;
        }

        case 'classifieds': {
          // Check if clicking on a listing
          for (let i = 0; i < this.classifieds.length; i++) {
            const y = 25 + i * 18;
            if (mx >= 5 && mx <= W-5 && my >= y && my <= y+16) {
              this.selectedClassifiedIdx = i;
              this.state = 'inspect';
              audio.play('select');
              return;
            }
          }

          // Back button
          if (mx >= 5 && mx <= 44 && my >= 182 && my <= 196) {
            this.state = 'garage';
            audio.play('click');
          }
          break;
        }

        case 'inspect': {
          const c = this.classifieds[this.selectedClassifiedIdx];
          if (!c) { this.state = 'classifieds'; return; }

          // Buy button
          if (mx >= 100 && mx <= 220 && my >= 140 && my <= 156) {
            if (this.cash >= c.price) {
              this.cash -= c.price;
              this.currentCar = {
                year: c.year, name: c.name, hp: c.hp, wt: c.wt, grip: c.grip,
                reliability: c.reliability, condition: c.condition, value: c.value,
                colorIdx: c.colorIdx, bodyStyle: c.bodyStyle,
                installedParts: [],
              };
              this.generatePartsShop(); // Reset parts shop for new car
              this.state = 'garage';
              audio.play('cash');
              this.showNotification(`Bought ${c.year} ${c.name}!`);

              // Remove from classifieds
              this.classifieds.splice(this.selectedClassifiedIdx, 1);

              // Check for hidden issues
              if (c.hiddenIssues > 0) {
                const repairCost = Math.floor(c.hiddenIssues * 15);
                this.cash -= repairCost;
                this.currentCar.reliability = Math.max(5, this.currentCar.reliability - c.hiddenIssues);
                this.showNotification(`Hidden issues! Repairs cost $${repairCost}`);
              }
            } else {
              audio.play('error');
              this.showNotification("Not enough cash!");
            }
            return;
          }

          // Back button
          if (mx >= 5 && mx <= 44 && my >= 182 && my <= 196) {
            this.state = 'classifieds';
            audio.play('click');
          }

          // Negotiate button
          if (mx >= 100 && mx <= 220 && my >= 160 && my <= 176) {
            // Simple negotiation: try to get 10% off
            const discount = Math.floor(c.price * 0.1);
            let success = false;

            switch(c.sellerFirmness) {
              case 'easy': success = Math.random() < 0.8; break;
              case 'medium': success = Math.random() < 0.5; break;
              case 'firm': success = Math.random() < 0.25; break;
              case 'stubborn': success = Math.random() < 0.1; break;
            }

            if (success) {
              c.price -= discount;
              audio.play('cash');
              this.showNotification(`Negotiated! $${discount} off!`);
            } else {
              audio.play('error');
              this.showNotification(`${c.sellerName} refused!`);
            }
            return;
          }

          // Inspect button (reveals hidden issues)
          if (mx >= 100 && mx <= 220 && my >= 180 && my <= 196) {
            c.inspected = true;
            audio.play('wrench');
            this.showNotification(`Hidden issues: ${c.hiddenIssues > 0 ? c.hiddenIssues + ' problems found!' : 'None detected'}`);
            return;
          }
          break;
        }

        case 'parts': {
          // Check if clicking on a part
          for (let i = 0; i < this.partsShop.length; i++) {
            const p = this.partsShop[i];
            const col = i % 5, row = Math.floor(i / 5);
            const bx = 10 + col * 62, by = 30 + row * 28;

            if (mx >= bx && mx <= bx+58 && my >= by && my <= by+24) {
              if (p.installed) {
                this.showNotification(`${p.name} already installed`);
                audio.play('error');
              } else if (this.cash >= p.cost) {
                this.selectedPartIdx = i;
                this.installPart = p;
                this.boltProgress = 0;
                this.numBolts = 3 + Math.floor(Math.random() * 2); // 3-4 bolts
                this.installAnimPhase = 0;

                // Generate bolt positions around the car on lift
                this.boltPositions = [];
                const cx = 160, cy = 95;
                for (let b = 0; b < this.numBolts; b++) {
                  const angle = (b / this.numBolts) * Math.PI * 2;
                  this.boltPositions.push({
                    x: cx + Math.cos(angle) * 35,
                    y: cy + Math.sin(angle) * 20,
                  });
                }

                this.state = 'install';
                audio.play('select');
              } else {
                audio.play('error');
                this.showNotification("Not enough cash!");
              }
              return;
            }
          }

          // Back button
          if (mx >= 5 && mx <= 44 && my >= 182 && my <= 196) {
            this.state = 'garage';
            audio.play('click');
          }
          break;
        }

        case 'install': {
          // Click to skip/finish installation (or use spacebar)
          if (this.installAnimPhase === 2 && mx >= 100 && mx <= 220 && my >= 170 && my <= 186) {
            this.state = 'garage';
            audio.play('click');
          }

          // Back button (cancel install)
          if (mx >= 5 && mx <= 44 && my >= 182 && my <= 196) {
            this.state = 'parts';
            audio.play('click');
          }
          break;
        }

        case 'races': {
          // Check if clicking on a race
          for (let i = 0; i < RACES.length; i++) {
            const r = RACES[i];
            const y = 25 + i * 18;
            const unlocked = this.reputation >= r.minRep;

            if (mx >= 5 && mx <= W-5 && my >= y && my <= y+16) {
              if (unlocked && this.currentCar) {
                this.selectedRace = i;
                this.racePhase = 'countdown';
                this.raceTimer = 180; // 3 seconds
                this.playerProgress = 0;
                this.opponentProgress = 0;
                this.raceResult = '';
                this.state = 'racing';
                audio.play('engine');
              } else if (!unlocked) {
                audio.play('error');
                this.showNotification(`Need ${r.minRep} reputation!`);
              } else {
                audio.play('error');
                this.showNotification("You need a car!");
              }
              return;
            }
          }

          // Back button
          if (mx >= 5 && mx <= 44 && my >= 182 && my <= 196) {
            this.state = 'garage';
            audio.play('click');
          }
          break;
        }

        case 'sell': {
          // Sell button
          if (mx >= 100 && mx <= 220 && my >= 140 && my <= 156) {
            if (this.currentCar) {
              const sellPrice = Math.floor(this.currentCar.value * 0.7);
              this.cash += sellPrice;
              audio.play('cash');
              this.showNotification(`Sold for $${sellPrice}!`);
              this.currentCar = null;
              this.state = 'classifieds';
            }
            return;
          }

          // Back button
          if (mx >= 5 && mx <= 44 && my >= 182 && my <= 196) {
            this.state = 'garage';
            audio.play('click');
          }
          break;
        }

        case 'tune': {
          // Simple tune: spend money to improve stats slightly
          if (mx >= 100 && mx <= 220 && my >= 80 && my <= 96) {
            // Tune engine: $150 for +5 HP, -2 reliability
            if (this.cash >= 150 && this.currentCar) {
              this.cash -= 150;
              this.currentCar.hp += 5;
              this.currentCar.reliability = Math.max(5, this.currentCar.reliability - 2);
              audio.play('wrench');
              this.showNotification("Engine tuned! +5 HP");
            } else {
              audio.play('error');
              this.showNotification("Need $150!");
            }
            return;
          }

          if (mx >= 100 && mx <= 220 && my >= 100 && my <= 116) {
            // Tune suspension: $100 for +3 grip
            if (this.cash >= 100 && this.currentCar) {
              this.cash -= 100;
              this.currentCar.grip += 3;
              audio.play('wrench');
              this.showNotification("Suspension tuned! +3 Grip");
            } else {
              audio.play('error');
              this.showNotification("Need $100!");
            }
            return;
          }

          if (mx >= 100 && mx <= 220 && my >= 120 && my <= 136) {
            // Tune brakes: $80 for +2 reliability
            if (this.cash >= 80 && this.currentCar) {
              this.cash -= 80;
              this.currentCar.reliability = Math.min(100, this.currentCar.reliability + 2);
              audio.play('wrench');
              this.showNotification("Brakes tuned! +2 Reliability");
            } else {
              audio.play('error');
              this.showNotification("Need $80!");
            }
            return;
          }

          // Back button
          if (mx >= 5 && mx <= 44 && my >= 182 && my <= 196) {
            this.state = 'garage';
            audio.play('click');
          }
          break;
        }

        case 'saveLoad': {
          // Save button
          if (mx >= 100 && mx <= 220 && my >= 100 && my <= 116) {
            const saveData = {
              cash: this.cash, reputation: this.reputation, day: this.day,
              racesWon: this.racesWon, difficulty: this.difficulty,
              currentCar: this.currentCar,
            };
            localStorage.setItem('streetGarage89', JSON.stringify(saveData));
            audio.play('cash');
            this.showNotification("Game saved!");
            this.state = 'garage';
            return;
          }

          // Load button
          if (mx >= 100 && mx <= 220 && my >= 130 && my <= 146) {
            const raw = localStorage.getItem('streetGarage89');
            if (raw) {
              try {
                const data = JSON.parse(raw);
                this.cash = data.cash || 3500;
                this.reputation = data.reputation || 0;
                this.day = data.day || 1;
                this.racesWon = data.racesWon || 0;
                this.difficulty = data.difficulty || 'easy';
                if (data.currentCar) {
                  this.currentCar = data.currentCar;
                  // Re-generate parts shop and mark installed
                  this.generatePartsShop();
                }
                audio.play('cash');
                this.showNotification("Game loaded!");
                this.state = this.currentCar ? 'garage' : 'classifieds';
              } catch(e) {
                audio.play('error');
                this.showNotification("Save file corrupted!");
              }
            } else {
              audio.play('error');
              this.showNotification("No save found!");
            }
            return;
          }

          // Back button (cancel)
          if (mx >= 5 && mx <= 44 && my >= 182 && my <= 196) {
            this.state = 'garage';
            audio.play('click');
          }
          break;
        }
      }
    }

    render() {
      ctx.clearRect(0, 0, W, H);

      switch(this.state) {
        case 'title': this.renderer.drawTitleScreen(); break;
        case 'difficulty': this.renderer.drawDifficultyScreen(this.input); break;
        case 'garage': this.renderGarage(); break;
        case 'classifieds': this.renderClassifieds(); break;
        case 'inspect': this.renderInspect(); break;
        case 'parts': this.renderParts(); break;
        case 'install': this.renderInstall(); break;
        case 'races': this.renderRaces(); break;
        case 'racing': this.renderRacing(); break;
        case 'sell': this.renderSell(); break;
        case 'tune': this.renderTune(); break;
        case 'saveLoad': this.renderer.drawSaveLoadScreen('both', this.input); break;
      }

      // Draw notification
      if (this.notificationTimer > 0) {
        this.renderer.drawNotification(this.notificationText, H - 15);
      }

      // Draw particles
      this.particles.draw(ctx);

      // Draw difficulty indicator in corner
      if (this.currentCar && this.state !== 'title' && this.state !== 'difficulty') {
        ctx.fillStyle = C.dimText;
        ctx.font = '4px monospace';
        ctx.fillText(this.difficulty.toUpperCase(), W - 35, H - 2);
      }

      // Draw mute indicator
      if (audio.muted) {
        ctx.fillStyle = C.red;
        ctx.font = '4px monospace';
        ctx.fillText('MUTE', 2, H - 2);
      }
    }

    renderGarage() {
      this.renderer.drawGarageBg();

      // Draw car on lift
      if (this.currentCar) {
        this.renderer.drawCarOnLift(160, 95, this.currentCar.colorIdx, this.currentCar.bodyStyle);

        // Car stats panel
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(230, 25, 88, 145);
        ctx.strokeStyle = C.accent;
        ctx.lineWidth = 1;
        ctx.strokeRect(230, 25, 88, 145);

        this.renderer.text(`${this.currentCar.year} ${this.currentCar.name}`, 234, 35, C.accent);
        this.renderer.text(`HP: ${this.currentCar.hp}`, 234, 48, C.lightGray);
        this.renderer.text(`WT: ${this.currentCar.wt}`, 234, 58, C.lightGray);
        this.renderer.text(`GRIP: ${this.currentCar.grip}`, 234, 68, C.lightGray);
        this.renderer.text(`REL: ${this.currentCar.reliability}%`, 234, 78, this.currentCar.reliability > 50 ? C.green : C.red);
        this.renderer.text(`VAL: $${this.currentCar.value}`, 234, 91, C.green);
        this.renderer.text(`COND: ${this.currentCar.condition}%`, 234, 101, C.lightGray);

        // Installed parts count
        const ipCount = this.currentCar.installedParts ? this.currentCar.installedParts.length : 0;
        this.renderer.text(`PARTS: ${ipCount}`, 234, 114, C.yellow);

        // Performance rating
        const perf = Math.floor((this.currentCar.hp / this.currentCar.wt * 1000 + this.currentCar.grip) / 2);
        this.renderer.text(`PERF: ${perf}`, 234, 127, C.accent);

        // Cash and reputation
        this.renderer.text(`CASH: $${this.cash}`, 234, 145, C.green);
        this.renderer.text(`REP: ${this.reputation}`, 234, 158, C.yellow);
        this.renderer.text(`DAY: ${this.day}`, 234, 171, C.lightGray);
      } else {
        this.renderer.textCentered('No car in garage!', 160, 95, C.red);
        this.renderer.textCentered('Buy one from classifieds', 160, 108, C.lightGray);
      }

      // Bottom buttons
      const btns = [
        {x: 5, y: 182, w: 40, h: 14, label: 'ADS'},
        {x: 50, y: 182, w: 40, h: 14, label: 'PARTS'},
        {x: 95, y: 182, w: 40, h: 14, label: 'RACES'},
        {x: 140, y: 182, w: 40, h: 14, label: 'SELL'},
        {x: 185, y: 182, w: 40, h: 14, label: 'TUNE'},
        {x: 230, y: 182, w: 40, h: 14, label: 'SAVE'},
      ];

      for (const b of btns) {
        const hover = this.input.mouseX >= b.x && this.input.mouseX <= b.x+b.w &&
                      this.input.mouseY >= b.y && this.input.mouseY <= b.y+b.h;
        this.renderer.button(b.x, b.y, b.w, b.h, b.label, hover);
      }

      // Keyboard hints
      this.renderer.text('C=G P=P R=R S=S', 5, H-2, C.dimText);
    }

    renderClassifieds() {
      this.renderer.drawNewspaperBg();

      for (let i = 0; i < this.classifieds.length; i++) {
        const c = this.classifieds[i];
        const y = 25 + i * 18;
        const hover = this.input.mouseX >= 5 && this.input.mouseX <= W-5 &&
                      this.input.mouseY >= y && this.input.mouseY <= y+16;

        if (hover) {
          ctx.fillStyle = 'rgba(0,0,0,0.1)';
          ctx.fillRect(5, y, W-10, 16);
        }

        this.renderer.text(`${c.year} ${c.name}`, 8, y+6, '#222');
        this.renderer.text(`$${c.price}`, 100, y+6, c.price <= this.cash ? '#2a8' : '#c44');
        this.renderer.text(`Cond:${c.condition}%`, 150, y+6, '#444');
        this.renderer.text(`HP:${c.hp}`, 200, y+6, '#444');
        this.renderer.text(`${c.sellerName}`, 235, y+6, '#555');

        if (hover) {
          this.renderer.drawTooltip(this.input.mouseX, y-8, `Click to inspect\n${c.sellerFirmness} seller`);
        }
      }

      this.renderer.button(5, 182, 40, 14, 'BACK',
        this.input.mouseX >= 5 && this.input.mouseX <= 44 &&
        this.input.mouseY >= 182 && this.input.mouseY <= 196);
    }

    renderInspect() {
      const c = this.classifieds[this.selectedClassifiedIdx];
      if (!c) { this.state = 'classifieds'; return; }

      this.renderer.drawNewspaperBg();

      // Car preview
      this.renderer.drawRaceCar(120, 50, c.colorIdx, c.bodyStyle);

      // Details
      this.renderer.text(`${c.year} ${c.name}`, 10, 75, '#222');
      this.renderer.text(`Price: $${c.price}`, 10, 88, c.price <= this.cash ? '#2a8' : '#c44');
      this.renderer.text(`Condition: ${c.condition}%`, 10, 100, '#444');
      this.renderer.text(`HP: ${c.hp}  WT: ${c.wt}`, 10, 112, '#444');
      this.renderer.text(`Grip: ${c.grip}  Rel: ${c.reliability}%`, 10, 124, '#444');
      this.renderer.text(`Mileage: ${c.mileage.toLocaleString()}`, 10, 136, '#444');
      this.renderer.text(`Seller: ${c.sellerName} (${c.sellerFirmness})`, 10, 148, '#555');

      if (c.inspected) {
        this.renderer.text(`Issues: ${c.hiddenIssues > 0 ? c.hiddenIssues + ' problems!' : 'None'}`, 160, 88, c.hiddenIssues > 0 ? '#c44' : '#2a8');
      }

      // Buttons
      const buyHover = this.input.mouseX >= 100 && this.input.mouseX <= 220 &&
                       this.input.mouseY >= 140 && this.input.mouseY <= 156;
      const negoHover = this.input.mouseX >= 100 && this.input.mouseX <= 220 &&
                        this.input.mouseY >= 160 && this.input.mouseY <= 176;
      const inspHover = this.input.mouseX >= 100 && this.input.mouseX <= 220 &&
                        this.input.mouseY >= 180 && this.input.mouseY <= 196;

      this.renderer.button(100, 140, 120, 16, `BUY ($${c.price})`, buyHover);
      this.renderer.button(100, 160, 120, 16, 'NEGOTIATE', negoHover);
      this.renderer.button(100, 180, 120, 16, c.inspected ? 'INSPECTED' : 'INSPECT', inspHover);
    }

    renderParts() {
      this.renderer.drawPartsShopBg();

      this.renderer.text('PARTS SHOP', 120, 8, C.accent);
      this.renderer.text(`CASH: $${this.cash}`, 230, 8, C.green);

      for (let i = 0; i < this.partsShop.length; i++) {
        const p = this.partsShop[i];
        const col = i % 5, row = Math.floor(i / 5);
        const bx = 10 + col * 62, by = 30 + row * 28;
        const hover = this.input.mouseX >= bx && this.input.mouseX <= bx+58 &&
                      this.input.mouseY >= by && this.input.mouseY <= by+24;
        const canBuy = !p.installed && this.cash >= p.cost;

        // Draw part icon
        if (!p.installed) {
          this.renderer.drawPartIcon(bx + 2, by + 1, p.id);
        }

        this.renderer.button(bx, by, 58, 24, p.installed ? 'INSTALLED' : `$${p.cost}`, hover && canBuy);

        if (hover) {
          const stats = [];
          if (p.stats.hp) stats.push(`HP:${p.stats.hp>0?'+':''}${p.stats.hp}`);
          if (p.stats.wt) stats.push(`WT:${p.stats.wt>0?'+':''}${p.stats.wt}`);
          if (p.stats.grip) stats.push(`GRIP:${p.stats.grip>0?'+':''}${p.stats.grip}`);
          if (p.stats.reliability) stats.push(`REL:${p.stats.reliability>0?'+':''}${p.stats.reliability}`);
          this.renderer.drawTooltip(this.input.mouseX, by-8, `${p.name}\n${stats.join(' ')}\n${p.desc}`);
        }
      }

      this.renderer.button(5, 182, 40, 14, 'BACK',
        this.input.mouseX >= 5 && this.input.mouseX <= 44 &&
        this.input.mouseY >= 182 && this.input.mouseY <= 196);
    }

    renderInstall() {
      this.renderer.drawInstallBg();

      // Draw car on lift
      if (this.currentCar) {
        this.renderer.drawCarOnLift(160, 95, this.currentCar.colorIdx, this.currentCar.bodyStyle);
      }

      // Draw part being installed
      if (this.installPart) {
        this.renderer.text(`Installing: ${this.installPart.name}`, 80, 30, C.accent);
        this.renderer.text(this.installPart.desc, 60, 42, C.lightGray);

        // Draw part icon large
        this.renderer.drawPartIcon(145, 50, this.installPart.id);

        // Draw bolt positions
        for (let i = 0; i < this.numBolts; i++) {
          const bp = this.boltPositions[i];
          if (bp) {
            if (i < this.boltProgress) {
              // Bolted - draw tight bolt
              this.renderer.drawBolt(bp.x, bp.y, true);
            } else if (i === this.boltProgress && this.installAnimPhase === 1) {
              // Current bolt - draw wrench animation
              this.wrenchAngle += 0.15;
              this.renderer.drawWrenchAnim(bp.x, bp.y, this.wrenchAngle / (Math.PI * 8));
              this.renderer.drawBoltHole(bp.x, bp.y, true);

              // Draw sparks
              if (Math.random() > 0.5) {
                this.renderer.drawSparks(bp.x, bp.y);
              }
            } else {
              // Not yet - draw hole
              this.renderer.drawBoltHole(bp.x, bp.y, false);
            }
          }
        }

        // Instructions
        if (this.installAnimPhase === 0) {
          this.renderer.textCentered('Positioning part...', W/2, 150, C.yellow);
          // Auto-transition to bolting after a moment
          if (Math.random() < 0.02) {
            this.installAnimPhase = 1;
            audio.play('wrench');
          }
        } else if (this.installAnimPhase === 1) {
          this.renderer.textCentered(`Tap SPACE to bolt (${this.boltProgress}/${this.numBolts})`, W/2, 150, C.yellow);

          // Progress bar for bolts
          this.renderer.progressBar(80, 160, W-160, 6, this.boltProgress * 100 / this.numBolts, 100, C.green);
        } else if (this.installAnimPhase === 2) {
          this.renderer.textCentered('Installation complete!', W/2, 150, C.green);
          this.renderer.button(100, 170, 120, 16, 'CONTINUE',
            this.input.mouseX >= 100 && this.input.mouseX <= 220 &&
            this.input.mouseY >= 170 && this.input.mouseY <= 186);
        }
      }

      // Back button
      this.renderer.button(5, 182, 40, 14, 'CANCEL',
        this.input.mouseX >= 5 && this.input.mouseX <= 44 &&
        this.input.mouseY >= 182 && this.input.mouseY <= 196);
    }

    renderRaces() {
      this.renderer.drawRaceMapBg();

      this.renderer.text('RACE SELECTION', 105, 8, C.yellow);
      this.renderer.text(`REP: ${this.reputation}`, 230, 8, C.lightGray);

      for (let i = 0; i < RACES.length; i++) {
        const r = RACES[i];
        const y = 25 + i * 18;
        const unlocked = this.reputation >= r.minRep;
        const hover = this.input.mouseX >= 5 && this.input.mouseX <= W-5 &&
                      this.input.mouseY >= y && this.input.mouseY <= y+16;

        if (hover) {
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          ctx.fillRect(5, y, W-10, 16);
        }

        this.renderer.text(r.name, 10, y+6, unlocked ? C.accent : C.dimText);
        this.renderer.text(`$${r.purse}`, 140, y+6, unlocked ? C.green : C.dimText);
        this.renderer.text(`Diff:${r.difficulty}`, 190, y+6, unlocked ? C.orange : C.dimText);
        this.renderer.text(`Min REP:${r.minRep}`, 240, y+6, unlocked ? C.lightGray : C.dimText);

        if (hover && unlocked) {
          this.renderer.drawTooltip(this.input.mouseX, y-8, `${r.desc}\nClick to race!`);
        }
      }

      this.renderer.button(5, 182, 40, 14, 'BACK',
        this.input.mouseX >= 5 && this.input.mouseX <= 44 &&
        this.input.mouseY >= 182 && this.input.mouseY <= 196);
    }

    renderRacing() {
      const race = RACES[this.selectedRace];

      // Background - road scene
      ctx.fillStyle = '#1a2030';
      ctx.fillRect(0, 0, W, H);

      // Sky gradient (simple)
      ctx.fillStyle = '#2a3050';
      ctx.fillRect(0, 0, W, 60);

      // Stars
      for (let i = 0; i < 15; i++) {
        ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random()*0.4})`;
        ctx.fillRect((i * 97) % W, (i * 53) % 50, 1, 1);
      }

      // Road
      this.renderer.drawRoad(120);
      this.renderer.drawRoad(145);

      // Finish line
      this.renderer.drawFinishLine(W - 20);

      // Race name
      this.renderer.text(race.name, 100, 5, C.yellow);

      // Countdown
      if (this.racePhase === 'countdown') {
        const countNum = Math.ceil(this.raceTimer / 60);
        if (countNum > 0) {
          this.renderer.textCentered(countNum.toString(), W/2, 75, C.yellow, 20);
        } else {
          this.renderer.textCentered('GO!', W/2, 75, C.green, 16);
        }
      }

      // Player car with trail
      const playerX = 20 + Math.floor(this.playerProgress * (W - 60));
      if (this.racePhase === 'racing' && Math.random() > 0.5) {
        this.particles.emit(playerX + 10, 162, 1, '#555', 0.5);
      }

      if (this.currentCar) {
        this.renderer.drawRaceCar(playerX, 150, this.currentCar.colorIdx, this.currentCar.bodyStyle);
      }

      // Opponent car
      const oppX = 20 + Math.floor(this.opponentProgress * (W - 60));
      this.renderer.drawOpponentCar(oppX, 125);

      // Lane labels
      this.renderer.text('YOU', 5, 153, C.green);
      this.renderer.text('OPP', 5, 128, C.red);

      // Progress bars
      this.renderer.progressBar(80, 175, W - 90, 6, this.playerProgress * 100, 100, C.green);
      this.renderer.progressBar(80, 125, W - 90, 6, this.opponentProgress * 100, 100, C.red);

      // Speed display
      if (this.racePhase === 'racing') {
        const speed = Math.floor(this.playerProgress * 2.5 + Math.random() * 10);
        this.renderer.text(`${speed} MPH`, W - 65, 182, C.lightGray);
      }

      // Result overlay
      if (this.racePhase === 'finished') {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, W, H);

        if (this.raceResult === 'win') {
          this.renderer.textCentered('YOU WIN!', W/2, 70, C.yellow, 16);
          const prize = Math.round(race.purse * (0.8 + Math.random() * 0.4));
          this.renderer.textCentered(`Prize: $${prize}`, W/2, 90, C.green);
        } else if (this.raceResult === 'breakdown') {
          this.renderer.textCentered('BROKEN DOWN!', W/2, 70, C.red, 14);
          this.renderer.textCentered('Your car gave up!', W/2, 88, C.lightGray);
        } else {
          this.renderer.textCentered('YOU LOSE', W/2, 70, C.red, 16);
          this.renderer.textCentered('Better luck next time.', W/2, 88, C.lightGray);
        }

        if (Math.floor(Date.now() / 500) % 2 === 0) {
          this.renderer.textCentered('[ CLICK TO CONTINUE ]', W/2, 130, C.yellow);
        }
      }

      // Difficulty indicator
      this.renderer.text(`[${this.difficulty.toUpperCase()}]`, W - 50, H - 3, C.dimText);
    }

    renderSell() {
      this.renderer.drawSellBg();

      if (this.currentCar) {
        this.renderer.text(`SELL ${this.currentCar.year} ${this.currentCar.name}?`, 40, 45, '#222');
        this.renderer.text(`Current Value: $${this.currentCar.value}`, 40, 65, '#444');
        this.renderer.text(`Sell Price: $${Math.floor(this.currentCar.value * 0.7)}`, 40, 80, C.green);
        this.renderer.text(`(You get 70% of value)`, 40, 95, '#666');

        this.renderer.button(100, 140, 120, 16, 'SELL CAR',
          this.input.mouseX >= 100 && this.input.mouseX <= 220 &&
          this.input.mouseY >= 140 && this.input.mouseY <= 156);
      } else {
        this.renderer.text('No car to sell!', 100, 80, '#c44');
      }

      this.renderer.button(5, 182, 40, 14, 'BACK',
        this.input.mouseX >= 5 && this.input.mouseX <= 44 &&
        this.input.mouseY >= 182 && this.input.mouseY <= 196);
    }

    renderTune() {
      this.renderer.drawTuneBg();

      this.renderer.text('TUNE CAR', 120, 35, C.accent);

      if (this.currentCar) {
        this.renderer.text(`Current: HP:${this.currentCar.hp} GRP:${this.currentCar.grip} REL:${this.currentCar.reliability}%`, 30, 55, C.lightGray);

        const tune1Hover = this.input.mouseX >= 100 && this.input.mouseX <= 220 &&
                           this.input.mouseY >= 80 && this.input.mouseY <= 96;
        const tune2Hover = this.input.mouseX >= 100 && this.input.mouseX <= 220 &&
                           this.input.mouseY >= 100 && this.input.mouseY <= 116;
        const tune3Hover = this.input.mouseX >= 100 && this.input.mouseX <= 220 &&
                           this.input.mouseY >= 120 && this.input.mouseY <= 136;

        this.renderer.button(100, 80, 120, 16, 'TUNE ENGINE $150', tune1Hover);
        this.renderer.button(100, 100, 120, 16, 'TUNE SUSP $100', tune2Hover);
        this.renderer.button(100, 120, 120, 16, 'TUNE BRAKES $80', tune3Hover);

        if (tune1Hover) this.renderer.drawTooltip(this.input.mouseX, 72, '+5 HP, -2 Reliability');
        if (tune2Hover) this.renderer.drawTooltip(this.input.mouseX, 92, '+3 Grip');
        if (tune3Hover) this.renderer.drawTooltip(this.input.mouseX, 112, '+2 Reliability');
      } else {
        this.renderer.text('No car to tune!', 100, 80, C.red);
      }

      this.renderer.button(5, 182, 40, 14, 'BACK',
        this.input.mouseX >= 5 && this.input.mouseX <= 44 &&
        this.input.mouseY >= 182 && this.input.mouseY <= 196);
    }

    gameLoop() {
      this.update();
      this.render();
      requestAnimationFrame(() => this.gameLoop());
    }
  }

// ============================================================
// INIT
// ============================================================
const audio = new AudioManager();
const game = new Game();

</script>
